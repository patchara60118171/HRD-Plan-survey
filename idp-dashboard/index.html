<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <!-- CSP handled by parent document -->
  <title>IDP Dashboard · Well-being Survey</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai+Looped:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #1E3A8A;
      --primary-light: #3B82F6;
      --primary-dark: #1E40AF;
      --accent: #F59E0B;
      --bg-surface: #F8FAFC;
      --bg-elevated: #FFFFFF;
      --text-primary: #0F172A;
      --text-secondary: #64748B;
      --text-muted: #94A3B8;
      --border-subtle: #E2E8F0;
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; font-family: 'IBM Plex Sans Thai Looped', system-ui, sans-serif; background: var(--bg-surface); color: var(--text-primary); }

    header {
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 50%, #1e293b 100%);
      color: #fff;
      padding: 0;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow-lg);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .header-inner {
      max-width: 1440px;
      margin: 0 auto;
      padding: 20px 32px 0;
    }
    .brand {
      font-size: 10px;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.6);
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 0 0 16px;
    }
    h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .subtitle {
      font-size: 13px;
      color: rgba(255,255,255,0.7);
      margin-top: 4px;
      font-weight: 400;
    }

    .tabs {
      display: flex;
      gap: 0;
      overflow-x: auto;
      padding-bottom: 0;
      margin-left: -32px;
      margin-right: -32px;
      padding-left: 32px;
      padding-right: 32px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .tab {
      background: transparent;
      color: rgba(255,255,255,0.6);
      border: none;
      padding: 14px 24px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border-radius: 8px 8px 0 0;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      white-space: nowrap;
      position: relative;
      margin-bottom: -1px;
    }
    .tab::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 0;
      height: 2px;
      background: var(--accent);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      transform: translateX(-50%);
    }
    .tab:hover {
      background: rgba(255,255,255,0.08);
      color: #fff;
    }
    .tab.active {
      background: rgba(255,255,255,0.12);
      color: #fff;
      font-weight: 600;
    }
    .tab.active::after {
      width: 60%;
    }

    main {
      max-width: 1440px;
      margin: 0 auto;
      padding: 28px 32px 40px;
      min-height: 80vh;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      flex-direction: column;
      gap: 16px;
      color: var(--text-secondary);
    }
    .spinner {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 3px solid var(--border-subtle);
      border-top-color: var(--primary-light);
      animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Skeleton loading styles */
    .skeleton-container {
      width: 100%;
      max-width: 100%;
      margin: 0 auto;
      padding: 0;
    }
    .skeleton-card {
      background: var(--bg-elevated);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      border: 1px solid var(--border-subtle);
      box-shadow: var(--shadow-sm);
    }
    .skeleton {
      background: linear-gradient(90deg, var(--bg-surface) 25%, #E2E8F0 50%, var(--bg-surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.8s ease-in-out infinite;
      border-radius: 8px;
    }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .skeleton-header {
      height: 28px;
      width: 220px;
      margin-bottom: 20px;
    }
    .skeleton-kpi {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 28px;
    }
    .skeleton-kpi-item {
      background: var(--bg-elevated);
      border-radius: 16px;
      padding: 24px;
      border: 1px solid var(--border-subtle);
      box-shadow: var(--shadow-sm);
    }
    .skeleton-number {
      height: 36px;
      width: 100px;
      margin-bottom: 12px;
    }
    .skeleton-label {
      height: 18px;
      width: 140px;
      margin-bottom: 8px;
    }
    .skeleton-sub {
      height: 16px;
      width: 120px;
    }
    .skeleton-chart {
      height: 320px;
      margin-bottom: 20px;
    }
    .skeleton-table {
      height: 220px;
    }

    /* Ensure filter bar stays sticky below header */
    #filter-bar {
      position: sticky !important;
      top: 88px !important;
      z-index: 90 !important;
      background: var(--bg-surface) !important;
      border-bottom: 1px solid var(--border-subtle) !important;
      box-shadow: var(--shadow-sm) !important;
    }

    .error {
      margin: 40px;
      padding: 28px;
      border-radius: 16px;
      background: #FEF2F2;
      border: 1px solid #FECACA;
      color: #7F1D1D;
      font-family: ui-monospace, 'SF Mono', Menlo, monospace;
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-word;
      box-shadow: var(--shadow-sm);
    }

    .panel {
      display: none;
      animation: fadeIn 0.3s ease-out;
    }
    .panel.active {
      display: block;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>

  <script>
  // ── Dynamic header height measurement for sticky filter bar ─────────────────
  (function () {
    function updateHeaderHeight() {
      var hdr = document.querySelector('header');
      if (!hdr) return;
      var h = hdr.getBoundingClientRect().height;
      document.documentElement.style.setProperty('--header-h', h + 'px');
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', updateHeaderHeight);
    } else {
      updateHeaderHeight();
    }
    window.addEventListener('resize', updateHeaderHeight);
    // Re-measure after fonts load (header height can change)
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(updateHeaderHeight);
    }
    setTimeout(updateHeaderHeight, 500);
  })();
  </script>

  <script>
  (function () {
    var SOURCES = {
      exec:     '/idp-dashboard/dashboards/exec.js',
      physical: '/idp-dashboard/dashboards/physical.js',
      tmhi:     '/idp-dashboard/dashboards/tmhi.js',
      ucla:     '/idp-dashboard/dashboards/ucla.js',
      env:      '/idp-dashboard/dashboards/env.js'
    };

    var scriptTags = Object.create(null); // key -> <script> element currently loaded
    var roots      = Object.create(null); // key -> React root
    var activeKey  = 'exec';
    var totalCount = 0;
    var currentFiltered = 0;
    var realDataLoaded = false;

    function showError(key, err) {
      console.error('[IDP] Dashboard load error:', key, err);
      var el = document.getElementById('panel-' + key);
      el.innerHTML = '<div class="error">' + String(err && err.stack || err)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;') + '</div>';
    }

    function ensureLibs() {
      if (!window.React || !window.ReactDOM || !window.Recharts) {
        throw new Error('React / ReactDOM / Recharts failed to load. Check console for CSP/network errors.');
      }
    }

    function loadScript(url) {
      return new Promise(function (resolve, reject) {
        var s = document.createElement('script');
        s.src = url;
        s.async = true;
        s.onload  = function () { resolve(s); };
        s.onerror = function () { reject(new Error('Failed to load ' + url)); };
        document.head.appendChild(s);
      });
    }

    function unmount(key) {
      if (roots[key]) {
        try { roots[key].unmount(); } catch (e) { /* ignore */ }
        delete roots[key];
      }
      if (scriptTags[key]) {
        try { scriptTags[key].remove(); } catch (e) { /* ignore */ }
        delete scriptTags[key];
      }
      if (window.__DASHBOARDS__) delete window.__DASHBOARDS__[key];
    }

    function mount(key) {
      var Comp = (window.__DASHBOARDS__ || {})[key];
      if (!Comp) { showError(key, 'Component not registered: ' + key); return; }
      var container = document.getElementById('panel-' + key);
      container.innerHTML = '';
      roots[key] = ReactDOM.createRoot(container);
      try { roots[key].render(React.createElement(Comp)); }
      catch (e) { showError(key, e); }
    }

    // Load + mount a single key. Always re-fetches with cache-bust so module-scope
    // `const employees = ...` picks up the latest window.__IDP_EMPLOYEES__.
    function loadAndMount(key) {
      try { ensureLibs(); } catch (e) { showError(key, e); return; }
      unmount(key);
      loadScript(SOURCES[key] + '?v=' + Date.now())
        .then(function (s) { scriptTags[key] = s; mount(key); })
        .catch(function (e) { showError(key, e); });
    }

    function reloadActive() {
      // Reload only the visible tab immediately; others load on switch.
      loadAndMount(activeKey);
    }

    function switchTab(key) {
      activeKey = key;
      document.querySelectorAll('.tab').forEach(function (b) {
        b.classList.toggle('active', b.dataset.key === key);
      });
      document.querySelectorAll('.panel').forEach(function (p) {
        p.classList.toggle('active', p.id === 'panel-' + key);
      });
      loadAndMount(key);
    }

    document.querySelectorAll('.tab').forEach(function (btn) {
      btn.addEventListener('click', function () { switchTab(btn.dataset.key); });
    });

    // ── Data bootstrap ────────────────────────────────────────────────────────
    function setSubtitle(text) {
      var el = document.getElementById('subtitle');
      if (el) el.textContent = text;
    }

    function handleFilterChange(filters) {
      if (!realDataLoaded) return;
      var bundle = window.IDPData.applyFilters(filters);
      window.__IDP_EMPLOYEES__ = bundle;
      currentFiltered = bundle.exec.length;
      window.IDPFilterBar.setCounts(totalCount, currentFiltered);
      reloadActive();
    }

    function mountFilterBar() {
      window.IDPFilterBar.mount(document.getElementById('filter-bar'), {
        onChange: handleFilterChange
      });
      window.IDPFilterBar.setCounts(totalCount, currentFiltered);
    }

    async function bootstrap() {
      try {
        if (typeof SUPABASE_URL === 'undefined' || typeof SUPABASE_ANON_KEY === 'undefined') {
          throw new Error('SUPABASE_URL/KEY globals missing — check /shared/config/supabase.js');
        }
        window.IDPData.init(SUPABASE_URL, SUPABASE_ANON_KEY);
        setSubtitle('กำลังดึงข้อมูลจาก cleaned_responses…');
        var rows = await window.IDPData.fetchAll();
        totalCount = rows.length;
        currentFiltered = rows.length;
        var bundle = window.IDPData.buildEmployees();
        window.__IDP_EMPLOYEES__ = bundle;
        realDataLoaded = true;
        setSubtitle('รายงานสุขภาวะ 4 มิติสุขภาวะ · ข้อมูล (' + totalCount.toLocaleString() + ' คน)');
        mountFilterBar();
        loadAndMount('exec'); // initial render
      } catch (e) {
        console.error('[IDP] Bootstrap failed:', e);
        setSubtitle('⚠️ โหลดข้อมูลจริงไม่สำเร็จ — ใช้ Mock Data · ' + (e.message || e));
        window.__IDP_EMPLOYEES__ = null;
        // Still mount filter bar (it will show "loading" state) and the exec tab with mock
        loadAndMount('exec');
      }
    }

    // Fire bootstrap once DOM + UMD libs are ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', bootstrap);
    } else {
      bootstrap();
    }
  })();
  </script>
