<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>IDP Dashboard · Well-being Survey</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; font-family: 'Sarabun', system-ui, sans-serif; background: #F1F5F9; color: #0F172A; }

    header {
      background: linear-gradient(135deg,#0F172A 0%,#1E3A5F 100%);
      color: #fff; padding: 0;
      position: sticky; top: 0; z-index: 100;
    }
    .header-inner { max-width: 1400px; margin: 0 auto; padding: 16px 24px 0; }
    .brand { font-size: 11px; letter-spacing: 2px; color: #93C5FD; text-transform: uppercase; }
    .title-row { display: flex; align-items: center; justify-content: space-between; margin: 6px 0 12px; }
    h1 { margin: 0; font-size: 20px; font-weight: 800; }
    .subtitle { font-size: 12px; color: #94A3B8; }

    .tabs { display: flex; gap: 2px; }
    .tab {
      background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7);
      border: none; padding: 12px 20px; font-family: inherit; font-size: 13px;
      font-weight: 600; cursor: pointer; border-radius: 10px 10px 0 0;
      transition: all 0.15s; white-space: nowrap;
    }
    .tab:hover { background: rgba(255,255,255,0.15); color: #fff; }
    .tab.active {
      background: #F1F5F9; color: #0F172A;
    }

    main { max-width: 1400px; margin: 0 auto; padding: 24px; min-height: 80vh; }

    .loading {
      display: flex; align-items: center; justify-content: center;
      min-height: 60vh; flex-direction: column; gap: 14px; color: #64748B;
    }
    .spinner {
      width: 42px; height: 42px; border-radius: 50%;
      border: 3px solid #CBD5E1; border-top-color: #2563EB;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error {
      margin: 40px; padding: 24px; border-radius: 14px;
      background: #FEF2F2; border: 1px solid #FECACA; color: #7F1D1D;
      font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 12px;
      white-space: pre-wrap; word-break: break-word;
    }

    .panel { display: none; }
    .panel.active { display: block; }
  </style>

  <!-- React + Recharts + Babel -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
  <script crossorigin src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="brand">NIDA · Well-being Survey</div>
      <div class="title-row">
        <div>
          <h1>IDP Dashboard</h1>
          <div class="subtitle">รายงาน 5 มิติสุขภาวะ · Mock Data Preview</div>
        </div>
      </div>
      <div class="tabs" id="tabs">
        <button class="tab active" data-key="env">🌿 Environment</button>
        <button class="tab" data-key="physical">💪 Physical</button>
        <button class="tab" data-key="tmhi">🧠 Mental (TMHI)</button>
        <button class="tab" data-key="ucla">🤝 Social (UCLA)</button>
        <button class="tab" data-key="exec">📊 Executive</button>
      </div>
    </div>
  </header>

  <main id="main">
    <div class="panel active" id="panel-env"><div class="loading"><div class="spinner"></div><div>กำลังโหลด Environment…</div></div></div>
    <div class="panel" id="panel-physical"><div class="loading"><div class="spinner"></div><div>กำลังโหลด Physical…</div></div></div>
    <div class="panel" id="panel-tmhi"><div class="loading"><div class="spinner"></div><div>กำลังโหลด TMHI…</div></div></div>
    <div class="panel" id="panel-ucla"><div class="loading"><div class="spinner"></div><div>กำลังโหลด UCLA…</div></div></div>
    <div class="panel" id="panel-exec"><div class="loading"><div class="spinner"></div><div>กำลังโหลด Executive…</div></div></div>
  </main>

  <script>
  (function () {
    // Globals for compiled JSX
    window.React = React;
    window.ReactDOM = ReactDOM;
    window.Recharts = Recharts;

    var SOURCES = {
      env:      '../idp dashboard/dashboards/env.jsx',
      physical: '../idp dashboard/dashboards/physical.jsx',
      tmhi:     '../idp dashboard/dashboards/tmhi.jsx',
      ucla:     '../idp dashboard/dashboards/ucla.jsx',
      exec:     '../idp dashboard/dashboards/exec.jsx'
    };

    var loaded = Object.create(null);
    var roots = Object.create(null); // key -> React root
    var current = 'env';

    function showError(key, err) {
      console.error('Dashboard load error:', key, err);
      var el = document.getElementById('panel-' + key);
      el.innerHTML = '<div class="error">' + String(err).replace(/&/g,'&amp;').replace(/</g,'&lt;') + '</div>';
    }

    function mount(key) {
      var Comp = (window.__DASHBOARDS__ || {})[key];
      if (!Comp) { showError(key, 'Component not registered: ' + key); return; }
      var container = document.getElementById('panel-' + key);
      // Clear spinner or previous content before mounting React
      container.innerHTML = '';
      if (!roots[key]) {
        roots[key] = ReactDOM.createRoot(container);
      }
      try {
        roots[key].render(React.createElement(Comp));
      } catch (e) {
        showError(key, e);
      }
    }

    function load(key) {
      if (loaded[key]) { mount(key); return; }
      var url = SOURCES[key] + '?t=' + Date.now();
      fetch(url)
        .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
        .then(function (src) {
          var out = Babel.transform(src, {
            presets: [['react', { runtime: 'classic' }]],
            filename: key + '.jsx'
          }).code;
          (0, eval)(out);
          loaded[key] = true;
          mount(key);
        })
        .catch(function (e) { showError(key, e); });
    }

    function switchTab(key) {
      current = key;
      document.querySelectorAll('.tab').forEach(function (b) {
        b.classList.toggle('active', b.dataset.key === key);
      });
      document.querySelectorAll('.panel').forEach(function (p) {
        p.classList.toggle('active', p.id === 'panel-' + key);
      });
      load(key);
    }

    // Tab click handlers
    document.querySelectorAll('.tab').forEach(function (btn) {
      btn.addEventListener('click', function () { switchTab(btn.dataset.key); });
    });

    // Load first tab
    load('env');
  })();
  </script>
</body>
</html>
