<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>IDP Dashboard · Well-being Survey</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; font-family: 'Sarabun', system-ui, sans-serif; background: #F1F5F9; color: #0F172A; }

    header {
      background: linear-gradient(135deg,#0F172A 0%,#1E3A5F 100%);
      color: #fff; padding: 0;
      position: sticky; top: 0; z-index: 100;
    }
    .header-inner { max-width: 1400px; margin: 0 auto; padding: 16px 24px 0; }
    .brand { font-size: 11px; letter-spacing: 2px; color: #93C5FD; text-transform: uppercase; }
    .title-row { display: flex; align-items: center; justify-content: space-between; margin: 6px 0 12px; }
    h1 { margin: 0; font-size: 20px; font-weight: 800; }
    .subtitle { font-size: 12px; color: #94A3B8; }

    .tabs { display: flex; gap: 2px; overflow-x: auto; }
    .tab {
      background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7);
      border: none; padding: 12px 20px; font-family: inherit; font-size: 13px;
      font-weight: 600; cursor: pointer; border-radius: 10px 10px 0 0;
      transition: all 0.15s; white-space: nowrap;
    }
    .tab:hover { background: rgba(255,255,255,0.15); color: #fff; }
    .tab.active { background: #F1F5F9; color: #0F172A; }

    main { max-width: 1400px; margin: 0 auto; padding: 24px; min-height: 80vh; }

    .loading {
      display: flex; align-items: center; justify-content: center;
      min-height: 60vh; flex-direction: column; gap: 14px; color: #64748B;
    }
    .spinner {
      width: 42px; height: 42px; border-radius: 50%;
      border: 3px solid #CBD5E1; border-top-color: #2563EB;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error {
      margin: 40px; padding: 24px; border-radius: 14px;
      background: #FEF2F2; border: 1px solid #FECACA; color: #7F1D1D;
      font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 12px;
      white-space: pre-wrap; word-break: break-word;
    }

    .panel { display: none; }
    .panel.active { display: block; }
  </style>

  <!-- React + Recharts (jsdelivr — whitelisted by site CSP) -->
  <script src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdn.jsdelivr.net/npm/prop-types@15.8.1/prop-types.min.js" crossorigin></script>
  <script src="https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.min.js" crossorigin></script>
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="brand">NIDA · Well-being Survey</div>
      <div class="title-row">
        <div>
          <h1>IDP Dashboard</h1>
          <div class="subtitle">รายงาน 5 มิติสุขภาวะ · Mock Data Preview</div>
        </div>
      </div>
      <div class="tabs" id="tabs">
        <button class="tab active" data-key="exec">📊 Executive</button>
        <button class="tab" data-key="physical">💪 Physical</button>
        <button class="tab" data-key="tmhi">🧠 Mental (TMHI)</button>
        <button class="tab" data-key="ucla">🤝 Social (UCLA)</button>
        <button class="tab" data-key="env">🌿 Environment</button>
      </div>
    </div>
  </header>

  <main id="main">
    <div class="panel active" id="panel-exec"><div class="loading"><div class="spinner"></div><div>กำลังโหลด Executive…</div></div></div>
    <div class="panel" id="panel-physical"><div class="loading"><div class="spinner"></div><div>กำลังโหลด Physical…</div></div></div>
    <div class="panel" id="panel-tmhi"><div class="loading"><div class="spinner"></div><div>กำลังโหลด Mental…</div></div></div>
    <div class="panel" id="panel-ucla"><div class="loading"><div class="spinner"></div><div>กำลังโหลด Social…</div></div></div>
    <div class="panel" id="panel-env"><div class="loading"><div class="spinner"></div><div>กำลังโหลด Environment…</div></div></div>
  </main>

  <script>
  (function () {
    // Pre-compiled .js files (built by ../idp dashboard/build.js)
    var SOURCES = {
      exec:     'dashboards/exec.js',
      physical: 'dashboards/physical.js',
      tmhi:     'dashboards/tmhi.js',
      ucla:     'dashboards/ucla.js',
      env:      'dashboards/env.js'
    };

    var loaded  = Object.create(null); // key -> true once script tag loaded
    var loading = Object.create(null); // key -> Promise
    var roots   = Object.create(null); // key -> React root

    function showError(key, err) {
      console.error('Dashboard load error:', key, err);
      var el = document.getElementById('panel-' + key);
      el.innerHTML = '<div class="error">' + String(err && err.stack || err)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;') + '</div>';
    }

    function ensureLibs() {
      if (!window.React || !window.ReactDOM || !window.Recharts) {
        throw new Error('React / ReactDOM / Recharts failed to load. ' +
          'Check browser console for CSP or network errors.');
      }
    }

    function loadScript(url) {
      return new Promise(function (resolve, reject) {
        var s = document.createElement('script');
        s.src = url;
        s.async = true;
        s.onload = function () { resolve(); };
        s.onerror = function () { reject(new Error('Failed to load ' + url)); };
        document.head.appendChild(s);
      });
    }

    function mount(key) {
      var Comp = (window.__DASHBOARDS__ || {})[key];
      if (!Comp) { showError(key, 'Component not registered: ' + key); return; }
      var container = document.getElementById('panel-' + key);
      container.innerHTML = '';
      if (!roots[key]) roots[key] = ReactDOM.createRoot(container);
      try { roots[key].render(React.createElement(Comp)); }
      catch (e) { showError(key, e); }
    }

    function load(key) {
      try { ensureLibs(); } catch (e) { showError(key, e); return; }

      if (loaded[key]) { mount(key); return; }
      if (loading[key]) { loading[key].then(function () { mount(key); }); return; }

      loading[key] = loadScript(SOURCES[key] + '?v=' + Date.now())
        .then(function () { loaded[key] = true; mount(key); })
        .catch(function (e) { showError(key, e); });
    }

    function switchTab(key) {
      document.querySelectorAll('.tab').forEach(function (b) {
        b.classList.toggle('active', b.dataset.key === key);
      });
      document.querySelectorAll('.panel').forEach(function (p) {
        p.classList.toggle('active', p.id === 'panel-' + key);
      });
      load(key);
    }

    document.querySelectorAll('.tab').forEach(function (btn) {
      btn.addEventListener('click', function () { switchTab(btn.dataset.key); });
    });

    // Boot with Executive tab
    load('exec');
  })();
  </script>
</body>
</html>
