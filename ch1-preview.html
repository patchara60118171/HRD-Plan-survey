<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Preview CH1 — HRD Plan Survey</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:#f5f7fb;color:#1e293b;font-size:15px}
.topbar{background:#1e3a5f;color:#fff;padding:14px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100}
.topbar h1{font-size:17px;font-weight:600}
.org-badge{background:rgba(255,255,255,.15);border-radius:6px;padding:3px 10px;font-size:13px}
.status-badge{border-radius:6px;padding:3px 10px;font-size:12px;font-weight:600}
.status-draft{background:#fef3c7;color:#92400e}
.status-submitted{background:#dcfce7;color:#166534}
.status-reopened{background:#fce7f3;color:#9d174d}
.topbar-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.btn{padding:7px 16px;border-radius:7px;border:none;cursor:pointer;font-size:14px;font-weight:500;transition:.15s}
.btn-primary{background:#2563eb;color:#fff}.btn-primary:hover{background:#1d4ed8}
.btn-secondary{background:#fff;color:#374151;border:1px solid #d1d5db}.btn-secondary:hover{background:#f9fafb}
.btn-green{background:#16a34a;color:#fff}.btn-green:hover{background:#15803d}
.btn-pdf{background:#dc2626;color:#fff}.btn-pdf:hover{background:#b91c1c}
.container{max-width:860px;margin:0 auto;padding:28px 20px 60px}
.section-card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;margin-bottom:24px}
.section-header{background:#f8fafc;border-bottom:1px solid #e2e8f0;padding:14px 20px}
.section-header h2{font-size:15px;font-weight:600;color:#1e3a5f}
.section-body{padding:20px}
.field-row{display:grid;grid-template-columns:200px 1fr;gap:10px;padding:9px 0;border-bottom:1px solid #f1f5f9;align-items:start}
.field-row:last-child{border-bottom:none}
.field-label{font-size:13px;color:#64748b;font-weight:500;padding-top:1px}
.field-value{font-size:14px;color:#1e293b;font-weight:500}
.field-value.empty{color:#94a3b8;font-style:italic}
.field-value.file-link a{color:#2563eb;text-decoration:none}
.field-value.file-link a:hover{text-decoration:underline}
.turnover-stack{display:grid;gap:22px}
.turnover-block{display:grid;gap:18px}
.turnover-item{display:grid;gap:8px}
.turnover-label{display:inline-flex;align-items:center;width:max-content;background:#2f67d8;color:#fff;font-size:13px;font-weight:700;line-height:1;padding:6px 8px;border-radius:0}
.turnover-row{display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:center;gap:10px}
.turnover-value{min-height:46px;display:flex;align-items:center;padding:10px 14px;border:1px solid #cfd8e6;border-radius:10px;background:#fff;font-size:15px;font-weight:500;color:#1e293b}
.turnover-value.empty{color:#94a3b8;font-style:italic}
.turnover-unit{display:inline-flex;align-items:center;justify-content:center;min-width:28px;height:30px;background:#2f67d8;color:#fff;font-size:12px;font-weight:700;padding:0 8px;border-radius:0}
.meta-box{background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:16px 20px;margin-bottom:24px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.meta-item label{font-size:12px;color:#64748b;display:block;margin-bottom:3px}
.meta-item .val{font-size:15px;font-weight:600;color:#1e3a5f}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid #e2e8f0;border-top-color:#2563eb;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;color:#64748b}
.alert{border-radius:8px;padding:14px 18px;margin-bottom:20px;font-size:14px}
.alert-error{background:#fee2e2;border:1px solid #fca5a5;color:#7f1d1d}
.alert-info{background:#eff6ff;border:1px solid #93c5fd;color:#1e3a8a}
@media(max-width:640px){.meta-box{grid-template-columns:1fr 1fr}.field-row{grid-template-columns:1fr;gap:3px}.turnover-row{grid-template-columns:1fr}.turnover-unit{justify-self:start}}
@media print{
  .topbar,.topbar-right,.no-print{display:none!important}
  body{background:#fff}
  .section-card{break-inside:avoid;border:1px solid #ccc;margin-bottom:16px}
  .container{padding:0;max-width:100%}
}
</style>
</head>
<body>

<div class="topbar">
  <h1>👁️ Preview CH1</h1>
  <span class="org-badge" id="org-name-badge">กำลังโหลด...</span>
  <span class="status-badge" id="status-badge" style="display:none"></span>
  <div class="topbar-right no-print">
    <button class="btn btn-secondary" onclick="history.back()">← กลับ</button>
    <button class="btn btn-secondary" id="btn-edit" onclick="goEdit()" style="display:none">✏️ แก้ไข</button>
    <button class="btn btn-pdf" onclick="goPDF()">📄 ดาวน์โหลด PDF</button>
    <button class="btn btn-green" onclick="window.print()">🖨️ พิมพ์</button>
  </div>
</div>

<div class="container">
  <div class="loading-screen" id="loading-screen">
    <div class="spinner"></div>
    <div>กำลังโหลดข้อมูล...</div>
  </div>
  <div id="content-area" style="display:none"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/form-schema.js"></script>
<script>
'use strict';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const params = new URLSearchParams(location.search);
const ORG_PARAM = params.get('org');
const ID_PARAM  = params.get('id');
let userRole = null, userOrgCode = null, responseData = null, schema = null;

const WORKFORCE_LAYOUT = {
  pos_o1: { label: 'ระดับ O1', unit: 'คน' },
  pos_o2: { label: 'ระดับ O2', unit: 'คน' },
  pos_o3: { label: 'ระดับ O3', unit: 'คน' },
  pos_o4: { label: 'ระดับ O4', unit: 'คน' },
  pos_k1: { label: 'ระดับ K1', unit: 'คน' },
  pos_k2: { label: 'ระดับ K2', unit: 'คน' },
  pos_k3: { label: 'ระดับ K3', unit: 'คน' },
  pos_k4: { label: 'ระดับ K4', unit: 'คน' },
  pos_k5: { label: 'ระดับ K5', unit: 'คน' },
  pos_m1: { label: 'ระดับ M1', unit: 'คน' },
  pos_m2: { label: 'ระดับ M2', unit: 'คน' },
  pos_s1: { label: 'ระดับ S1', unit: 'คน' },
  pos_s2: { label: 'ระดับ S2', unit: 'คน' },
  type_official: { label: 'ข้าราชการ', unit: 'คน' },
  type_employee: { label: 'พนักงานราชการ', unit: 'คน' },
  type_contract: { label: 'ลูกจ้างประจำ/ชั่วคราว', unit: 'คน' },
  type_other: { label: 'อื่นๆ', unit: 'คน' },
  age_u30: { label: 'อายุไม่เกิน 30 ปี', unit: 'คน' },
  age_31_40: { label: 'อายุ 31 - 40 ปี', unit: 'คน' },
  age_41_50: { label: 'อายุ 41 - 50 ปี', unit: 'คน' },
  age_51_60: { label: 'อายุ 51 - 60 ปี', unit: 'คน' },
};

function buildWorkforcePreview() {
  const block = document.createElement('div');
  block.className = 'turnover-stack';

  const availableKeys = new Set(Object.keys(responseData || {}));
  const groups = [
    { heading: 'ข้อมูลโครงสร้างอัตรากำลัง', fields: ['pos_o1','pos_o2','pos_o3','pos_o4','pos_k1','pos_k2','pos_k3','pos_k4','pos_k5','pos_m1','pos_m2','pos_s1','pos_s2'] },
    { heading: 'ประเภทบุคลากร', fields: ['type_official', 'type_employee', 'type_contract', 'type_other'] },
    { heading: 'ช่วงอายุของบุคลากร', fields: ['age_u30', 'age_31_40', 'age_41_50', 'age_51_60'] },
  ].filter((group) => group.fields.some((fieldKey) => availableKeys.has(fieldKey)));

  groups.forEach((group) => {
    const groupEl = document.createElement('div');
    groupEl.className = 'turnover-block';

    if (group.heading) {
      const heading = document.createElement('div');
      heading.className = 'turnover-label';
      heading.textContent = group.heading;
      groupEl.appendChild(heading);
    }

    group.fields.forEach((fieldKey) => {
      const meta = WORKFORCE_LAYOUT[fieldKey];
      if (!meta) return;
      const itemEl = document.createElement('div');
      itemEl.className = 'turnover-item';

      const label = document.createElement('div');
      label.className = 'turnover-label';
      label.textContent = meta.label;
      itemEl.appendChild(label);

      const row = document.createElement('div');
      row.className = 'turnover-row';

      const value = document.createElement('div');
      value.className = 'turnover-value';
      const raw = responseData?.[fieldKey];
      if (raw !== null && raw !== undefined && raw !== '') {
        value.textContent = raw;
      } else {
        value.classList.add('empty');
        value.textContent = '—';
      }
      row.appendChild(value);

      const unit = document.createElement('span');
      unit.className = 'turnover-unit';
      unit.textContent = meta.unit;
      row.appendChild(unit);

      itemEl.appendChild(row);
      groupEl.appendChild(itemEl);
    });

    block.appendChild(groupEl);
  });

  return block;
}

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { location.href = 'org-portal.html'; return; }

  const email = session.user.email;
  const { data: roleRow } = await sb.from('admin_user_roles').select('role,org_code').eq('email', email).maybeSingle();
  if (!roleRow) { showError('ไม่พบสิทธิ์การเข้าใช้งาน'); return; }

  userRole = roleRow.role;
  userOrgCode = roleRow.org_code || null;

  if (userRole === 'org_hr') {
    if (!userOrgCode || (ORG_PARAM && ORG_PARAM !== userOrgCode)) {
      showError('คุณไม่มีสิทธิ์เข้าถึงข้อมูลองค์กรนี้'); return;
    }
  }

  const targetOrg = ORG_PARAM || userOrgCode;
  if (!targetOrg) { showError('ไม่พบรหัสองค์กร'); return; }

  try {
    [schema, responseData] = await Promise.all([
      FormSchema.loadFormSchema('ch1'),
      loadResponse(targetOrg)
    ]);
  } catch(e) { showError('โหลดข้อมูลไม่สำเร็จ: ' + e.message); return; }

  if (!responseData) { showError('ไม่พบข้อมูล CH1 สำหรับองค์กรนี้'); return; }
  renderPage(targetOrg);
}

async function loadResponse(orgCode) {
  let q = sb.from('hrd_ch1_responses').select('*').order('created_at', { ascending: false });
  if (ID_PARAM) q = q.eq('id', ID_PARAM);
  else q = q.eq('org_code', orgCode).limit(1);
  const { data } = await q.maybeSingle();
  return data;
}

function renderPage(orgCode) {
  const status = responseData?.status || 'draft';
  const orgName = responseData?.organization || orgCode;

  document.getElementById('org-name-badge').textContent = orgName;
  const sb2 = document.getElementById('status-badge');
  sb2.style.display = '';
  sb2.textContent = {draft:'Draft', submitted:'ส่งแล้ว', reopened:'เปิดแก้ไข'}[status] || status;
  sb2.className = 'status-badge status-' + status;

  // Show edit button if editable
  const canEdit = userRole === 'super_admin' || userRole === 'admin'
    || (userRole === 'org_hr' && ['draft','reopened'].includes(status));
  if (canEdit) document.getElementById('btn-edit').style.display = '';

  const content = document.getElementById('content-area');
  content.innerHTML = '';

  // Meta summary box
  const meta = document.createElement('div');
  meta.className = 'meta-box no-print';
  meta.innerHTML = `
    <div class="meta-item"><label>องค์กร</label><div class="val">${orgName}</div></div>
    <div class="meta-item"><label>รหัสองค์กร</label><div class="val">${responseData.org_code || orgCode}</div></div>
    <div class="meta-item"><label>สถานะ</label><div class="val">${{draft:'📝 Draft', submitted:'✅ ส่งแล้ว', reopened:'🔄 เปิดแก้ไข'}[status] || status}</div></div>
    <div class="meta-item"><label>บุคลากรรวม</label><div class="val">${responseData.total_staff || '-'} คน</div></div>
    <div class="meta-item"><label>วันที่อัปเดต</label><div class="val">${responseData.updated_at ? new Date(responseData.updated_at).toLocaleDateString('th-TH') : '-'}</div></div>
    <div class="meta-item"><label>ID</label><div class="val" style="font-size:11px;word-break:break-all">${responseData.id || '-'}</div></div>
  `;
  content.appendChild(meta);

  // Render sections
  if (schema?.sections?.length > 0) {
    schema.sections.forEach(sec => {
      const questions = sec.questions || [];
      // Skip docs section in preview — show as links
      const card = document.createElement('div');
      card.className = 'section-card';
      card.innerHTML = `<div class="section-header"><h2>📋 ${sec.title_th}</h2></div>`;
      const body = document.createElement('div');
      body.className = 'section-body';

      if (sec.section_key === 'ch1_workforce') {
        body.appendChild(buildWorkforcePreview());
        card.appendChild(body);
        content.appendChild(card);
        return;
      }

      questions.forEach(q => {
        const val = responseData[q.question_key];
        const row = document.createElement('div');
        row.className = 'field-row';

        const labelEl = document.createElement('div');
        labelEl.className = 'field-label';
        labelEl.textContent = q.label_th;
        row.appendChild(labelEl);

        const valEl = document.createElement('div');
        valEl.className = 'field-value';

        if (q.input_type === 'file') {
          if (val) {
            valEl.className += ' file-link';
            valEl.innerHTML = `<a href="${val}" target="_blank">📎 ดาวน์โหลดไฟล์</a>`;
          } else {
            valEl.className += ' empty'; valEl.textContent = 'ไม่มีไฟล์';
          }
        } else if (Array.isArray(val)) {
          valEl.textContent = val.join(', ') || '—';
        } else if (val !== null && val !== undefined && val !== '') {
          valEl.textContent = val;
        } else {
          valEl.className += ' empty'; valEl.textContent = '—';
        }

        row.appendChild(valEl);
        body.appendChild(row);
      });

      card.appendChild(body);
      content.appendChild(card);
    });
  } else {
    // Fallback: render all keys from responseData
    const card = document.createElement('div');
    card.className = 'section-card';
    card.innerHTML = '<div class="section-header"><h2>ข้อมูล CH1</h2></div>';
    const body = document.createElement('div');
    body.className = 'section-body';
    const skip = ['id','created_at','updated_at','status','org_code'];
    Object.entries(responseData).forEach(([k, v]) => {
      if (skip.includes(k)) return;
      const row = document.createElement('div');
      row.className = 'field-row';
      row.innerHTML = `<div class="field-label">${k}</div><div class="field-value">${v ?? '—'}</div>`;
      body.appendChild(row);
    });
    card.appendChild(body);
    content.appendChild(card);
  }

  document.getElementById('loading-screen').style.display = 'none';
  content.style.display = '';
}

function goEdit() {
  const orgCode = ORG_PARAM || userOrgCode;
  location.href = `ch1-edit.html?org=${encodeURIComponent(orgCode)}&id=${responseData?.id || ''}`;
}

function goPDF() {
  const orgCode = ORG_PARAM || userOrgCode;
  location.href = `ch1-individual-pdf.html?org=${encodeURIComponent(orgCode)}&id=${responseData?.id || ''}`;
}

function showError(msg) {
  document.getElementById('loading-screen').innerHTML = `<div class="alert alert-error" style="max-width:480px">⛔ ${msg}</div><br><a href="org-portal.html" style="color:#2563eb">← กลับหน้า Portal</a>`;
}

init();
</script>
</body>
</html>
