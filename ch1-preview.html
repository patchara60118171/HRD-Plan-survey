<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Preview แบบสำรวจข้อมูลองค์กร — HRD Plan Survey</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans Thai Looped','Sarabun',sans-serif;background:#F8FAFC;color:#1e293b;font-size:15px}
.topbar{background:#fff;color:#1e293b;padding:14px 24px;display:flex;align-items:flex-start;gap:16px;position:sticky;top:0;z-index:100;border-bottom:1px solid #e2e8f0;box-shadow:0 1px 2px rgba(15,23,42,.04)}
.topbar-main{display:flex;flex-direction:column;gap:8px;min-width:0}
.topbar h1{font-size:17px;font-weight:700;line-height:1.35;color:#0F4C81}
.topbar-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.topbar .org-badge{background:#E8F1FB;color:#0F4C81;border-radius:999px;padding:5px 12px;font-size:13px;border:1px solid #cfe0f5}
.topbar .status-badge{border-radius:999px;padding:5px 12px;font-size:12px;font-weight:600}
.status-draft{background:#fef3c7;color:#92400e}
.status-submitted{background:#dcfce7;color:#166534}
.status-reopened{background:#fce7f3;color:#9d174d}
.topbar-right{margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.btn{padding:8px 16px;border-radius:10px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:.15s}
.btn-primary{background:#0F4C81;color:#fff}.btn-primary:hover{background:#0A3560}
.btn-secondary{background:#fff;color:#475569;border:1px solid #d1d5db}.btn-secondary:hover{background:#f8fafc}
.btn-green{background:#16a34a;color:#fff}.btn-green:hover{background:#15803d}
.btn-pdf{background:#dc2626;color:#fff}.btn-pdf:hover{background:#b91c1c}
.container{max-width:768px;margin:0 auto;padding:20px 16px 60px}
.page-shell{background:#fff;border-radius:24px;box-shadow:0 1px 3px rgba(15,23,42,.06);border:1px solid #f1f5f9;padding:24px 24px 8px}
.section-card{margin-bottom:28px;overflow:visible;padding:0;background:transparent;border:none}
.section-header{padding:0;margin-bottom:14px;display:block;background:transparent;border-bottom:none}
.section-header h2{font-size:20px;font-weight:700;color:#0F4C81;line-height:1.35}
.section-desc{font-size:13px;color:#64748b;line-height:1.7}
.section-body{padding:0}
.field-row{display:grid;grid-template-columns:1fr;gap:4px;margin-bottom:18px}
.field-label{font-size:14px;font-weight:600;color:#334155;line-height:1.55}
.field-value{font-size:14px;color:#1e293b;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:14px;padding:12px 16px;min-height:46px;line-height:1.6;word-break:break-word}
.field-value.empty{color:#94a3b8;font-style:italic}
.compact-panel{background:#F8FAFC;border-radius:16px;padding:16px;border:1px solid #eef2f7;margin-bottom:16px}
.compact-panel-title{font-size:14px;font-weight:700;color:#334155;margin-bottom:12px}
.compact-subtitle{font-size:12px;font-weight:600;color:#475569;margin:0 0 8px}
.compact-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
.compact-grid.g5{grid-template-columns:repeat(5,minmax(0,1fr))}
.compact-grid.g2{grid-template-columns:repeat(2,minmax(0,1fr))}
.compact-field{display:grid;gap:4px}
.compact-field label{display:block;font-size:12px;color:#64748b;line-height:1.4}
.compact-field .cv{width:100%;border:1px solid #E2E8F0;border-radius:10px;padding:9px 10px;font-size:14px;text-align:center;background:#fff;color:#1e293b;min-height:38px}
.compact-field .cv.empty{color:#94a3b8;font-style:italic}
.compact-total{margin-top:8px;text-align:right;font-size:12px;color:#94a3b8}
.compact-total strong{color:#475569}
.compact-section{display:grid;gap:14px}
.turnover-table-wrap{overflow-x:auto;background:#F8FAFC;border-radius:16px;padding:16px;border:1px solid #eef2f7;margin-bottom:16px}
.turnover-table{width:100%;min-width:640px;border-collapse:separate;border-spacing:0 8px}
.turnover-table th{font-size:13px;font-weight:700;color:#334155;padding-bottom:6px;text-align:center}
.turnover-table th:first-child{text-align:left;width:180px}
.turnover-table td{vertical-align:middle}
.turnover-row-label{padding-right:12px;color:#475569;font-weight:600;font-size:14px;line-height:1.5}
.turnover-row-label small{display:block;font-size:12px;color:#94a3b8;font-weight:400;margin-top:2px}
.turnover-table .tv{border:1px solid #e2e8f0;border-radius:10px;padding:9px 10px;font-size:13px;text-align:center;background:#fff;min-height:38px}
.turnover-rate-box{border:1px solid #e2e8f0;border-radius:10px;padding:9px 10px;font-size:13px;text-align:center;background:#f8fafc;color:#64748b;font-weight:600}
.turnover-divider td{padding:0}
.turnover-divider-line{height:1px;background:#e2e8f0}
.fq-row{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.rank-chip{display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:12px;border:1px solid #e2e8f0;background:#fff;font-size:14px;color:#334155;margin-bottom:8px}
.rank-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.meta-box{background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:16px 20px;margin-bottom:24px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.meta-item label{font-size:12px;color:#64748b;display:block;margin-bottom:3px}
.meta-item .val{font-size:15px;font-weight:600;color:#1e3a5f}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid #e2e8f0;border-top-color:#2563eb;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;color:#64748b}
.alert{border-radius:8px;padding:14px 18px;margin-bottom:20px;font-size:14px}
.alert-error{background:#fee2e2;border:1px solid #fca5a5;color:#7f1d1d}
.alert-info{background:#eff6ff;border:1px solid #93c5fd;color:#1e3a8a}
@media(max-width:900px){.topbar{flex-direction:column;align-items:stretch}.topbar-right{margin-left:0;justify-content:flex-start}.container{padding:16px 12px 60px}.page-shell{padding:18px 16px 8px}}
@media(max-width:640px){.fq-row{grid-template-columns:1fr}.meta-box{grid-template-columns:1fr 1fr}.compact-grid,.compact-grid.g5,.compact-grid.g2{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media print{.topbar,.topbar-right,.no-print{display:none!important}body{background:#fff}.page-shell{box-shadow:none;border:none}.section-card{break-inside:avoid}.container{padding:0;max-width:100%}}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-main">
    <h1>👁️ Preview แบบสำรวจข้อมูลองค์กร</h1>
    <div class="topbar-meta">
      <span class="org-badge" id="org-name-badge">กำลังโหลด...</span>
      <span class="status-badge" id="status-badge" style="display:none"></span>
    </div>
  </div>
  <div class="topbar-right no-print">
    <button class="btn btn-secondary" onclick="history.back()">← กลับ</button>
    <button class="btn btn-secondary" id="btn-edit" onclick="goEdit()" style="display:none">✏️ แก้ไข</button>
    <button class="btn btn-pdf" onclick="goPDF()">📄 ดาวน์โหลด PDF</button>
    <button class="btn btn-green" onclick="window.print()">🖨️ พิมพ์</button>
  </div>
</div>

<div class="container">
  <div class="page-shell">
    <div class="loading-screen" id="loading-screen">
      <div class="spinner"></div>
      <div>กำลังโหลดข้อมูล...</div>
    </div>
    <div id="content-area" style="display:none"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/project-ssot.js"></script>
<script src="js/form-schema.js"></script>
<script>
'use strict';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const params = new URLSearchParams(location.search);
const ORG_PARAM = params.get('org');
const ID_PARAM  = params.get('id');
const EXPORT_MODE = (params.get('export') || '').toLowerCase();
const AUTO_CLOSE_EXPORT = params.get('autoclose') !== '0';
let userRole = null, userOrgCode = null, responseData = null, schema = null;
let autoExportTriggered = false;

const ORG_NAME_MAP = {
  'nesdc':'สำนักงานสภาพัฒนาการเศรษฐกิจและสังคมแห่งชาติ',
  'tpso':'สำนักงานนโยบายและยุทธศาสตร์การค้า',
  'dss':'กรมวิทยาศาสตร์บริการ',
  'dhss':'กรมสนับสนุนบริการสุขภาพ','hssd':'กรมสนับสนุนบริการสุขภาพ',
  'tmd':'กรมอุตุนิยมวิทยา','dcp':'กรมส่งเสริมวัฒนธรรม',
  'dop':'กรมคุมประพฤติ','probation':'กรมคุมประพฤติ',
  'mots':'สำนักงานปลัดกระทรวงการท่องเที่ยวและกีฬา','dmh':'กรมสุขภาพจิต',
  'onep':'สำนักงานนโยบายและแผนทรัพยากรธรรมชาติและสิ่งแวดล้อม',
  'nrct':'สำนักงานการวิจัยแห่งชาติ',
  'acfs':'สำนักงานมาตรฐานสินค้าเกษตรและอาหารแห่งชาติ',
  'opdc':'สำนักงานคณะกรรมการพัฒนาระบบราชการ','ocsc':'สำนักงานคณะกรรมการพัฒนาระบบราชการ',
  'rid':'กรมชลประทาน','dcy':'กรมกิจการเด็กและเยาวชน','doh':'กองฝึกอบรม กรมทางหลวง',
  'tst':'องค์กรทดสอบระบบ',
};

const WF = {
  type_official:'ข้าราชการ', type_employee:'พนักงานราชการ', type_contract:'ลูกจ้าง', type_other:'อื่น ๆ',
  age_u30:'ไม่เกิน 30 ปี', age_31_40:'31–40 ปี', age_41_50:'41–50 ปี', age_51_60:'51–60 ปี',
  service_u1:'ไม่เกิน 1 ปี', service_1_5:'1-5 ปี', service_6_10:'6-10 ปี', service_11_15:'11-15 ปี',
  service_16_20:'16-20 ปี', service_21_25:'21-25 ปี', service_26_30:'26-30 ปี', service_over30:'31 ปีขึ้นไป',
  pos_o1:'ปฏิบัติงาน (O1)', pos_o2:'ชำนาญงาน (O2)', pos_o3:'อาวุโส (O3)', pos_o4:'ทักษะพิเศษ (O4)',
  pos_k1:'ปฏิบัติการ (K1)', pos_k2:'ชำนาญการ (K2)', pos_k3:'ชำนาญการพิเศษ (K3)', pos_k4:'เชี่ยวชาญ (K4)', pos_k5:'ทรงคุณวุฒิ (K5)',
  pos_m1:'ระดับต้น (M1)', pos_m2:'ระดับสูง (M2)',
  pos_s1:'ระดับต้น (S1)', pos_s2:'ระดับสูง (S2)',
};

function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function vv(k){const v=responseData?.[k];return(v!==null&&v!==undefined&&v!=='')?esc(v):null}
function displayVal(k){const v=vv(k);return v!==null?v:'<span class="empty">—</span>'}
function compactVal(k){const v=vv(k);return `<div class="cv${v===null?' empty':''}">${v??'—'}</div>`}
function sumF(keys){return keys.reduce((s,k)=>s+(Number(responseData?.[k]||0)||0),0)}

function compactPanel(title,keys,gc){
  const a=keys.filter(k=>WF[k]);if(!a.length)return '';
  return `<div class="compact-panel"><h3 class="compact-panel-title">${title}</h3>
    <div class="compact-grid ${gc||''}">${a.map(k=>`<div class="compact-field"><label>${WF[k]}</label>${compactVal(k)}</div>`).join('')}</div>
    <div class="compact-total">ผลรวม: <strong>${sumF(a)}</strong> คน</div></div>`;
}

function positionPanel(){
  const sg=[
    {t:'ประเภททั่วไป',k:['pos_o1','pos_o2','pos_o3','pos_o4'],g:''},
    {t:'ประเภทวิชาการ',k:['pos_k1','pos_k2','pos_k3','pos_k4','pos_k5'],g:'g5'},
    {t:'ประเภทอำนวยการ',k:['pos_m1','pos_m2'],g:'g2'},
    {t:'ประเภทบริหาร',k:['pos_s1','pos_s2'],g:'g2'},
  ];
  const all=sg.flatMap(g=>g.k);
  if(!all.some(k=>WF[k]))return '';
  return `<div class="compact-panel compact-section"><h3 class="compact-panel-title">จำแนกตามประเภทและระดับตำแหน่ง</h3>
    ${sg.map(g=>{const a=g.k.filter(k=>WF[k]);if(!a.length)return '';
      return `<h4 class="compact-subtitle">${g.t}</h4><div class="compact-grid ${g.g}">${a.map(k=>`<div class="compact-field"><label>${WF[k]}</label>${compactVal(k)}</div>`).join('')}</div>`}).join('')}
    <div class="compact-total">ผลรวม: <strong>${sumF(all.filter(k=>WF[k]))}</strong> คน</div></div>`;
}

function turnoverHTML(){
  const yrs=[2564,2565,2566,2567,2568];
  const rows=[{k:'begin',t:'จำนวนข้าราชการ',s:'ต้นปี (1 ต.ค.)'},{k:'end',t:'จำนวนข้าราชการ',s:'ปลายปี (30 ก.ย.)'},{k:'leave',t:'จำนวนข้าราชการ',s:'ลาออกและโอนย้าย'}];
  const rate=yrs.map(y=>{const b=Number(responseData?.[`begin_${y}`]||0),e=Number(responseData?.[`end_${y}`]||0),l=Number(responseData?.[`leave_${y}`]||0),d=(b+e)/2;return d>0?((l/d)*100).toFixed(2):'-'});
  return `<div class="turnover-table-wrap"><table class="turnover-table">
    <thead><tr><th></th>${yrs.map(y=>`<th>${y}</th>`).join('')}</tr></thead><tbody>
    ${rows.map(r=>`<tr><td class="turnover-row-label">${r.t}<small>${r.s}</small></td>${yrs.map(y=>`<td><div class="tv">${displayVal(`${r.k}_${y}`)}</div></td>`).join('')}</tr>`).join('')}
    <tr class="turnover-divider"><td colspan="6"><div class="turnover-divider-line"></div></td></tr>
    <tr><td class="turnover-row-label">ร้อยละ<small>(คำนวณอัตโนมัติ)</small></td>${rate.map(r=>`<td><div class="turnover-rate-box">${r}</div></td>`).join('')}</tr>
  </tbody></table></div>`;
}

async function init(){
  const{data:{session}}=await sb.auth.getSession();
  if(!session){location.href='org-portal.html';return}
  const{data:roleRow}=await sb.from('admin_user_roles').select('role,org_code').eq('email',session.user.email).maybeSingle();
  if(!roleRow){showError('ไม่พบสิทธิ์การเข้าใช้งาน');return}
  userRole=roleRow.role;userOrgCode=roleRow.org_code||null;
  if(userRole==='org_hr'&&(!userOrgCode||(ORG_PARAM&&ORG_PARAM!==userOrgCode))){showError('คุณไม่มีสิทธิ์เข้าถึงข้อมูลองค์กรนี้');return}
  const targetOrg=ORG_PARAM||userOrgCode;
  if(!targetOrg){showError('ไม่พบรหัสองค์กร');return}
  try{[schema,responseData]=await Promise.all([FormSchema.loadFormSchema('ch1'),loadResponse(targetOrg)])}
  catch(e){showError('โหลดข้อมูลไม่สำเร็จ: '+e.message);return}
  if(!responseData){showError('ไม่พบข้อมูลแบบสำรวจข้อมูลองค์กรสำหรับองค์กรนี้');return}
  renderPage(targetOrg);
}

async function loadResponse(orgCode){
  let q=sb.from('hrd_ch1_responses').select('*').order('created_at',{ascending:false});
  if(ID_PARAM)q=q.eq('id',ID_PARAM);else q=q.eq('org_code',orgCode).limit(1);
  const{data}=await q.maybeSingle();return data;
}

function renderPage(orgCode){
  const status=responseData?.status||'draft';
  const orgName=responseData?.organization||ORG_NAME_MAP[orgCode]||orgCode;
  const fd=responseData||{};

  document.getElementById('org-name-badge').textContent=orgName;
  const sb2=document.getElementById('status-badge');
  sb2.style.display='';
  sb2.textContent={draft:'Draft',submitted:'ส่งแล้ว',reopened:'เปิดแก้ไข'}[status]||status;
  sb2.className='status-badge status-'+status;

  const canEdit=userRole==='super_admin'||userRole==='admin'||(userRole==='org_hr'&&['draft','reopened'].includes(status));
  if(canEdit)document.getElementById('btn-edit').style.display='';

  const diseaseFields=[['diabetes','เบาหวาน'],['hypertension','ความดันโลหิตสูง'],['cardiovascular','โรคหัวใจและหลอดเลือด'],['kidney','โรคไต'],['liver','โรคตับ'],['cancer','โรคมะเร็ง'],['obesity','ภาวะอ้วน/น้ำหนักเกิน']];
  const mentalFields=[['stress','ภาวะเครียดเรื้อรัง'],['anxiety','ภาวะวิตกกังวล'],['sleep','ปัญหาการนอนหลับ'],['burnout','ภาวะหมดไฟ (Burnout)'],['depression','ภาวะซึมเศร้า']];
  const systems=(typeof PROJECT_SSOT!=='undefined'&&PROJECT_SSOT.ch1?.supportSystems)||[
    {id:'mentoring_system',label:'ระบบพี่เลี้ยง (Mentoring)'},
    {id:'job_rotation',label:'ระบบหมุนเวียนงาน (Job Rotation)'},
    {id:'idp_system',label:'การจัดทำแผนพัฒนารายบุคคล (IDP)'},
    {id:'career_path_system',label:'เส้นทางความก้าวหน้า (Career Path)'},
  ];
  const optMap={full:'มีตามแผน',partial:'มีไม่ครบตามแผน',none:'ไม่มี'};
  const reportMap={actual:'ข้อมูลจริง',estimated:'ประมาณการ',none:'ไม่มีข้อมูล'};
  const ergoMap={none:'ยังไม่มี',planned:'มีแผนแต่ยังไม่ดำเนินการ',in_progress:'อยู่ระหว่างดำเนินการ',done:'ดำเนินการแล้ว'};
  const digitalSystems=[['e_doc','ระบบเอกสารอิเล็กทรอนิกส์'],['e_sign','ระบบลงนามอิเล็กทรอนิกส์'],['cloud','ระบบ Cloud'],['hr_digital','ระบบ HR Digital'],['health_db','ระบบฐานข้อมูลสุขภาพ'],['none','ไม่มีระบบดังกล่าว']];
  const dsVal=Array.isArray(fd.digital_systems)?fd.digital_systems:[];
  const topics=(typeof PROJECT_SSOT!=='undefined'&&PROJECT_SSOT.ch1?.strategicTopics)||[];
  const rankColors=['#2563eb','#7c3aed','#059669'];
  const rankBg=['#dbeafe','#ede9fe','#d1fae5'];

  let html='';

  // Meta
  html+=`<div class="meta-box no-print">
    <div class="meta-item"><label>องค์กร</label><div class="val">${esc(orgName)}</div></div>
    <div class="meta-item"><label>รหัสองค์กร</label><div class="val">${esc(fd.org_code||orgCode)}</div></div>
    <div class="meta-item"><label>สถานะ</label><div class="val">${{draft:'📝 Draft',submitted:'✅ ส่งแล้ว',reopened:'🔄 เปิดแก้ไข'}[status]||status}</div></div>
    <div class="meta-item"><label>บุคลากรรวม</label><div class="val">${fd.total_staff||'-'} คน</div></div>
    <div class="meta-item"><label>วันที่อัปเดต</label><div class="val">${fd.updated_at?new Date(fd.updated_at).toLocaleDateString('th-TH'):'-'}</div></div>
    <div class="meta-item"><label>ID</label><div class="val" style="font-size:11px;word-break:break-all">${fd.id||'-'}</div></div>
  </div>`;

  // ═══ ส่วนที่ 1 ═══
  html+=`<div class="section-card">

function triggerAutoExportIfNeeded(){
  if (autoExportTriggered) return;
  if (EXPORT_MODE !== 'pdf' && EXPORT_MODE !== 'docs') return;
  autoExportTriggered = true;

  if (EXPORT_MODE === 'pdf') {
    setTimeout(() => window.print(), 220);
    return;
  }

  setTimeout(() => {
    downloadPreviewAsDoc();
    if (AUTO_CLOSE_EXPORT) setTimeout(() => window.close(), 450);
  }, 220);
}

function sanitizeFilePart(value){
  return String(value || '')
    .trim()
    .replace(/[\\/:*?"<>|]+/g, '-')
    .replace(/\s+/g, '_')
    .slice(0, 80) || 'ch1-preview';
}

function downloadPreviewAsDoc(){
  const styleText = Array.from(document.querySelectorAll('style')).map((node) => node.textContent || '').join('\n');
  const topbarMain = document.querySelector('.topbar-main')?.outerHTML || '';
  const pageShell = document.querySelector('.container')?.outerHTML || '';
  const orgName = document.getElementById('org-name-badge')?.textContent || responseData?.organization || ORG_PARAM || 'org';
  const datePart = new Date().toISOString().slice(0, 10);
  const fileName = `${sanitizeFilePart(orgName)}_ch1_preview_${datePart}.doc`;

  const docHtml = `<!DOCTYPE html>
<html lang="th"><head><meta charset="UTF-8"><title>แบบสำรวจข้อมูลองค์กร Preview</title>
<style>${styleText}
/* ── Docs export overrides ── */
*,body,table,th,td,div,span,p,h1,h2,h3,h4,h5,h6,input,textarea,select,button{
  font-family:'TH Sarabun New','Cordia New','Angsana New',sans-serif!important;
}
.topbar-right{display:none!important}
.no-print{display:block!important}
</style>
</head><body>
<div class="topbar">${topbarMain}</div>
${pageShell}
</body></html>`;

  const blob = new Blob(['\ufeff', docHtml], { type: 'application/msword' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = fileName;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

window.addEventListener('afterprint', () => {
  if (EXPORT_MODE === 'pdf' && AUTO_CLOSE_EXPORT) {
    setTimeout(() => window.close(), 350);
  }
});

function goEdit(){
  const orgCode=ORG_PARAM||userOrgCode;
  location.href=`ch1-edit?org=${encodeURIComponent(orgCode)}&id=${responseData?.id||''}`;
}
function goPDF(){
  const orgCode=ORG_PARAM||userOrgCode;
  location.href=`ch1-individual-pdf?org=${encodeURIComponent(orgCode)}&id=${responseData?.id||''}`;
}
function showError(msg){
  document.getElementById('loading-screen').innerHTML=`<div class="alert alert-error" style="max-width:480px">⛔ ${msg}</div><br><a href="org-portal.html" style="color:#2563eb">← กลับหน้า Portal</a>`;
}

</script>
