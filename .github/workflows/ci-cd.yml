# =============================================
# GitHub Actions CI/CD Pipeline for Well-being Survey v3.1
# Auto-deploy to Vercel on push to main
# =============================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ============================================
  # Job 1: Lint & Test
  # ============================================
  lint-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: |
          npx eslint js/ --ext .js --max-warnings=10 || true

      - name: Run Prettier check
        run: |
          npx prettier --check "**/*.js" "**/*.html" "**/*.css" || true

      - name: TypeScript type check
        run: |
          npx tsc --noEmit || true

  # ============================================
  # Job 2: Security Scan
  # ============================================
  security-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run npm audit
        run: |
          npm audit --audit-level=moderate || true

      - name: Check for hardcoded secrets
        run: |
          echo "Scanning for potential hardcoded secrets..."
          # Check for common secret patterns in source files
          if grep -rn --include="*.js" --include="*.html" --include="*.ts" \
            -E "(password|secret|private_key|api_key)\s*=\s*['\"][^'\"]{8,}['\"]" \
            --exclude-dir=node_modules . 2>/dev/null | \
            grep -v "process\.env\." | \
            grep -v "secrets\.\|GITHUB_TOKEN\|VERCEL_TOKEN" | \
            grep -v "placeholder\|example\|sample\|test\|dummy"; then
            echo "⚠️  Potential hardcoded secrets found - please review"
            exit 1
          else
            echo "✅ No hardcoded secrets detected"
          fi

  # ============================================
  # Job 3: Build & Deploy (Production)
  # ============================================
  deploy-production:
    runs-on: ubuntu-latest
    needs: [lint-and-test, security-scan]
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Deploy to Vercel (Production)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'

  # ============================================
  # Job 4: Deploy Preview (Development)
  # ============================================
  deploy-preview:
    runs-on: ubuntu-latest
    needs: [lint-and-test]
    if: github.ref == 'refs/heads/develop'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Vercel (Preview)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}

  # ============================================
  # Job 5: Performance Check (Lighthouse)
  # ============================================
  lighthouse-check:
    runs-on: ubuntu-latest
    needs: deploy-production
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v10
        with:
          urls: |
            https://nidawellbeing.vercel.app/
            https://nidawellbeing.vercel.app/ch1.html
          uploadArtifacts: true
          temporaryPublicStorage: true

  # ============================================
  # Job 6: Database Migration Check
  # ============================================
  database-check:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check migration files
        run: |
          echo "Checking database migrations..."
          ls -la supabase/migrations/

      - name: Validate SQL syntax
        run: |
          for file in supabase/migrations/*.sql; do
            echo "Validating $file..."
            # Basic syntax check (would need actual DB connection for full validation)
            head -50 "$file" > /dev/null && echo "✓ $file looks valid"
          done
