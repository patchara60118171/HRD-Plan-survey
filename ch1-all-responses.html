<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ดูการตอบแบบประเมิน - ระบบประเมินสภาพความเป็นอยู่ที่ดี</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai+Looped:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0F4C81',
                        accent: '#00A86B'
                    },
                    fontFamily: {
                        sans: ['IBM Plex Sans Thai Looped', 'sans-serif']
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 font-sans">
    <div class="min-h-screen">
        <!-- Header -->
        <header class="bg-gradient-to-r from-primary to-blue-700 text-white shadow-lg">
            <div class="max-w-7xl mx-auto px-4 py-6">
                <div class="flex items-center justify-between">
                    <div>
                        <h1 class="text-3xl font-bold mb-2">ดูการตอบแบบประเมิน</h1>
                        <p class="text-blue-100">View All Assessment Responses</p>
                    </div>
                    <a href="/ch1.html" class="px-4 py-2 bg-white text-primary rounded-lg font-semibold hover:bg-opacity-90 transition">
                        ← กลับไปยังแบบประเมิน
                    </a>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="max-w-7xl mx-auto px-4 py-8">
            <!-- Statistics -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                <div class="bg-white rounded-lg shadow p-4 border-l-4 border-primary">
                    <p class="text-slate-600 text-sm font-semibold mb-1">รวมทั้งสิ้น</p>
                    <p class="text-3xl font-bold text-primary" id="stat-total">0</p>
                </div>
                <div class="bg-white rounded-lg shadow p-4 border-l-4 border-green-500">
                    <p class="text-slate-600 text-sm font-semibold mb-1">เสร็จสิ้น</p>
                    <p class="text-3xl font-bold text-green-600" id="stat-completed">0</p>
                </div>
                <div class="bg-white rounded-lg shadow p-4 border-l-4 border-yellow-500">
                    <p class="text-slate-600 text-sm font-semibold mb-1">รอดำเนินการ</p>
                    <p class="text-3xl font-bold text-yellow-600" id="stat-pending">0</p>
                </div>
                <div class="bg-white rounded-lg shadow p-4 border-l-4 border-blue-500">
                    <p class="text-slate-600 text-sm font-semibold mb-1">หน่วยงาน</p>
                    <p class="text-3xl font-bold text-blue-600" id="stat-orgs">0</p>
                </div>
            </div>

            <!-- Filters -->
            <div class="bg-white rounded-lg shadow p-4 mb-6">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <!-- Search -->
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">ค้นหา</label>
                        <input type="text" id="search-input" placeholder="ค้นหาจากชื่อหน่วยงาน..."
                            class="w-full border-2 border-slate-200 rounded-lg px-3 py-2 text-sm focus:border-primary focus:outline-none transition">
                    </div>

                    <!-- Organization Filter -->
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">หน่วยงาน</label>
                        <select id="org-filter" class="w-full border-2 border-slate-200 rounded-lg px-3 py-2 text-sm focus:border-primary focus:outline-none transition">
                            <option value="">-- ทั้งหมด --</option>
                        </select>
                    </div>

                    <!-- Status Filter -->
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">สถานะ</label>
                        <select id="status-filter" class="w-full border-2 border-slate-200 rounded-lg px-3 py-2 text-sm focus:border-primary focus:outline-none transition">
                            <option value="">-- ทั้งหมด --</option>
                            <option value="completed">เสร็จสิ้น</option>
                            <option value="pending">รอดำเนินการ</option>
                        </select>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="mt-4 flex gap-2">
                    <button id="reset-filters-btn" class="px-4 py-2 bg-slate-300 text-slate-700 rounded-lg text-sm font-semibold hover:bg-slate-400 transition">
                        รีเซ็ตตัวกรอง
                    </button>
                    <button id="export-csv-btn" class="px-4 py-2 bg-accent text-white rounded-lg text-sm font-semibold hover:bg-opacity-90 transition">
                        📥 ส่งออก CSV
                    </button>
                    <button id="export-json-btn" class="px-4 py-2 bg-blue-500 text-white rounded-lg text-sm font-semibold hover:bg-opacity-90 transition">
                        📥 ส่งออก JSON
                    </button>
                </div>
            </div>

            <!-- Responses Table -->
            <div class="bg-white rounded-lg shadow overflow-hidden">
                <div id="responses-container" class="p-4">
                    <div class="text-center py-8">
                        <p class="text-slate-600">กำลังโหลดการตอบแบบประเมิน...</p>
                    </div>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="bg-slate-800 text-white mt-12 py-6 border-t border-slate-700">
            <div class="max-w-7xl mx-auto px-4 text-center text-sm">
                <p>© 2026 Thai Government Well-being Assessment System</p>
                <p class="text-slate-400 mt-2">Admin Panel - All Responses</p>
            </div>
        </footer>
    </div>

    <!-- Modal for detailed response view -->
    <div id="response-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-2xl mx-4 max-h-96 overflow-y-auto">
            <div class="sticky top-0 bg-slate-100 px-6 py-4 border-b border-slate-200 flex justify-between items-center">
                <h3 class="text-lg font-bold text-slate-800">รายละเอียดการตอบแบบประเมิน</h3>
                <button onclick="closeModal()" class="text-slate-500 hover:text-slate-700 text-2xl">&times;</button>
            </div>
            <div id="modal-content" class="p-6">
                <!-- Content will be loaded here -->
            </div>
            <div class="bg-slate-100 px-6 py-4 border-t border-slate-200 flex justify-end gap-2">
                <button onclick="closeModal()" class="px-4 py-2 bg-slate-300 text-slate-700 rounded-lg text-sm font-semibold hover:bg-slate-400 transition">
                    ปิด
                </button>
                <button id="modal-delete-btn" class="px-4 py-2 bg-red-500 text-white rounded-lg text-sm font-semibold hover:bg-opacity-90 transition">
                    ลบ
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/js/data-loader.js"></script>
    <script src="/js/response-viewer.js"></script>

    <script>
        const dataLoader = new DataLoader('/data/');
        let responseViewer = null;
        let allOrganizations = [];

        // Initialize
        async function init() {
            try {
                const config = await dataLoader.loadConfig();
                const organizations = await dataLoader.loadOrganizations();

                responseViewer = new ResponseViewer(dataLoader, config.responseViewerConfiguration || {});
                allOrganizations = organizations.organizations || [];

                // Populate organization filter
                const orgFilter = document.getElementById('org-filter');
                for (const org of allOrganizations) {
                    const option = document.createElement('option');
                    option.value = org.id;
                    option.textContent = org.name;
                    orgFilter.appendChild(option);
                }

                // Load mock data (in production, this would load from Supabase)
                loadMockData();

                // Setup event listeners
                setupEventListeners();

                // Render initial view
                renderResponses();
                updateStatistics();
            } catch (error) {
                console.error('Initialization error:', error);
                document.getElementById('responses-container').innerHTML = `
                    <div class="p-6 bg-red-50 border-2 border-red-200 rounded-lg">
                        <h3 class="text-red-800 font-bold mb-2">เกิดข้อผิดพลาด</h3>
                        <p class="text-red-700">${error.message}</p>
                    </div>
                `;
            }
        }

        // Load mock data (development only)
        function loadMockData() {
            const mockResponses = [
                {
                    id: 'resp_001',
                    org_name: 'สำนักงานสภาพัฒนาการเศรษฐกิจและสังคมแห่งชาติ',
                    organization_id: 'org_001',
                    submitted_date: new Date('2026-03-15'),
                    created_at: '2026-03-15T10:30:00Z',
                    status: 'completed'
                },
                {
                    id: 'resp_002',
                    org_name: 'กรมวิทยาศาสตร์บริการ',
                    organization_id: 'org_003',
                    submitted_date: new Date('2026-03-14'),
                    created_at: '2026-03-14T14:20:00Z',
                    status: 'completed'
                },
                {
                    id: 'resp_003',
                    org_name: 'สำนักงบประมาณ',
                    organization_id: 'org_004',
                    submitted_date: new Date('2026-03-13'),
                    created_at: '2026-03-13T09:15:00Z',
                    status: 'pending'
                }
            ];

            responseViewer.responses = mockResponses;
            responseViewer.filteredResponses = [...mockResponses];
        }

        // Setup event listeners
        function setupEventListeners() {
            // Search
            document.getElementById('search-input').addEventListener('input', (e) => {
                responseViewer.search(e.target.value);
                renderResponses();
            });

            // Organization filter
            document.getElementById('org-filter').addEventListener('change', (e) => {
                if (e.target.value) {
                    responseViewer.filterByOrganization(e.target.value);
                } else {
                    responseViewer.reset();
                }
                renderResponses();
            });

            // Status filter
            document.getElementById('status-filter').addEventListener('change', (e) => {
                if (e.target.value) {
                    responseViewer.filterByStatus(e.target.value);
                } else {
                    responseViewer.reset();
                }
                renderResponses();
            });

            // Reset filters
            document.getElementById('reset-filters-btn').addEventListener('click', () => {
                document.getElementById('search-input').value = '';
                document.getElementById('org-filter').value = '';
                document.getElementById('status-filter').value = '';
                responseViewer.reset();
                renderResponses();
            });

            // Export buttons
            document.getElementById('export-csv-btn').addEventListener('click', () => {
                responseViewer.downloadExport('csv');
            });

            document.getElementById('export-json-btn').addEventListener('click', () => {
                responseViewer.downloadExport('json');
            });
        }

        // Render responses table
        function renderResponses() {
            responseViewer.renderTable('responses-container');

            // Override callbacks
            responseViewer.onViewResponse = viewResponse;
            responseViewer.onDeleteResponse = deleteResponse;
        }

        // Update statistics
        function updateStatistics() {
            const stats = responseViewer.getStatistics();
            document.getElementById('stat-total').textContent = stats.totalResponses;
            document.getElementById('stat-completed').textContent = stats.completedResponses;
            document.getElementById('stat-pending').textContent = stats.pendingResponses;
            document.getElementById('stat-orgs').textContent = stats.organizationCount;
        }

        // View response details
        function viewResponse(response) {
            const modalContent = document.getElementById('modal-content');
            modalContent.innerHTML = `
                <div class="space-y-4">
                    <div>
                        <p class="text-xs font-semibold text-slate-500 uppercase">ID</p>
                        <p class="text-sm text-slate-700">${response.id}</p>
                    </div>
                    <div>
                        <p class="text-xs font-semibold text-slate-500 uppercase">หน่วยงาน</p>
                        <p class="text-sm text-slate-700">${response.org_name}</p>
                    </div>
                    <div>
                        <p class="text-xs font-semibold text-slate-500 uppercase">วันที่ส่ง</p>
                        <p class="text-sm text-slate-700">${new Date(response.submitted_date).toLocaleDateString('th-TH')}</p>
                    </div>
                    <div>
                        <p class="text-xs font-semibold text-slate-500 uppercase">สถานะ</p>
                        <p class="text-sm"><span class="px-2 py-1 rounded-full text-xs font-semibold ${response.status === 'completed' ? 'bg-green-100 text-green-800' : 'bg-yellow-100 text-yellow-800'}">${response.status}</span></p>
                    </div>
                    <div>
                        <p class="text-xs font-semibold text-slate-500 uppercase">ข้อมูลเพิ่มเติม</p>
                        <pre class="text-xs bg-slate-100 p-2 rounded overflow-auto max-h-32">${JSON.stringify(response, null, 2)}</pre>
                    </div>
                </div>
            `;

            // Store current response ID for delete action
            document.getElementById('modal-delete-btn').dataset.responseId = response.id;

            document.getElementById('response-modal').classList.remove('hidden');
        }

        // Delete response
        function deleteResponse(response) {
            if (confirm(`ยืนยันการลบการตอบแบบประเมินของ ${response.org_name}?`)) {
                // In production, would call API to delete from Supabase
                responseViewer.responses = responseViewer.responses.filter(r => r.id !== response.id);
                responseViewer.filteredResponses = responseViewer.filteredResponses.filter(r => r.id !== response.id);
                renderResponses();
                updateStatistics();
                alert('ลบการตอบแบบประเมินเรียบร้อย');
            }
        }

        // Close modal
        function closeModal() {
            document.getElementById('response-modal').classList.add('hidden');
        }

        // Close modal on background click
        document.getElementById('response-modal').addEventListener('click', (e) => {
            if (e.target.id === 'response-modal') {
                closeModal();
            }
        });

        // Initialize app
        init();
    </script>
</body>
</html>
