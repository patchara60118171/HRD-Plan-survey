<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Well-being Survey</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        body {
            background: #F1F5F9;
            padding: 2rem;
        }

        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid #E2E8F0;
            padding-bottom: 1rem;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
            display: block;
            overflow-x: auto;
        }

        .data-table th,
        .data-table td {
            padding: 0.75rem;
            border: 1px solid #E2E8F0;
            text-align: left;
            white-space: nowrap;
        }

        .data-table th {
            background: #F8FAFC;
            font-weight: 600;
        }

        .login-box {
            max-width: 400px;
            margin: 100px auto;
            text-align: center;
            padding: 2rem;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .actions-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
        }

        .status-badge.good {
            background: #D1FAE5;
            color: #065F46;
        }

        .status-badge.poor {
            background: #FEE2E2;
            color: #991B1B;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>

<body>

    <!-- Login Screen -->
    <div id="login-screen" class="login-box">
        <h2>🔐 Admin Login</h2>
        <p style="color: #64748B; margin-bottom: 1.5rem;">กรุณากรอกรหัสผ่านเพื่อเข้าถึงข้อมูล</p>
        <input type="password" id="admin-pass" class="input-field" placeholder="Password" style="margin-bottom: 1rem;">
        <button onclick="adminLogin()" class="btn-start" style="width: 100%; padding: 0.75rem;">เข้าสู่ระบบ</button>
    </div>

    <!-- Dashboard Screen -->
    <div id="dashboard-screen" class="admin-container" style="display: none;">
        <div class="admin-header">
            <div>
                <h1 style="margin: 0;">📊 Dashboard</h1>
                <p style="color: #64748B; margin: 0;">ภาพรวมผลการประเมินสุขภาวะ</p>
            </div>
            <div>
                <button onclick="location.href='../index.html'" class="btn-login">🏠 หน้าหลัก</button>
            </div>
        </div>

        <div class="actions-bar">
            <button onclick="fetchData()" class="btn-action">🔄 รีเฟรชข้อมูล</button>
            <button onclick="downloadExcel()" class="btn-action primary">📥 Export Excel</button>
            <button onclick="initializeHeaders()" class="btn-action" style="background: #F59E0B; color: white;">⚡
                สร้างหัวตาราง (Setup Headers)</button>
        </div>

        <div id="loading" style="display: none; text-align: center; padding: 2rem;">กำลังโหลดข้อมูล...</div>

        <div style="overflow-x: auto;">
            <table class="data-table" id="responses-table">
                <thead>
                    <tr id="table-headers">
                        <th>ลำดับ</th>
                        <th>เวลา</th>
                        <th>ชื่อ</th>
                        <th>BMI</th>
                        <th>TMHI-15</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <!-- Data will be injected here -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="../js/questions.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/app.js"></script> <!-- To access GOOGLE_SCRIPT_URL -->
    <script>
        // Use the same URL as the main app (from app.js)
        // GOOGLE_SCRIPT_URL is defined in app.js
        const SCRIPT_URL = GOOGLE_SCRIPT_URL;
    </script>
    <script src="../js/admin.js"></script>
</body>

</html>
