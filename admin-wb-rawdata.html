<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Wellbeing Survey — Raw Data | Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai+Looped:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --P:#0F4C81;--PD:#0A3560;--PL:#E8F1FB;
  --A:#00A86B;--AL:#E6F7F1;
  --W:#92681A;--WL:#FEF3CD;
  --D:#991B1B;--DL:#FEE2E2;
  --bg:#F4F6F9;--bg2:#EAECF0;
  --card:#fff;--bdr:#D8DCE3;--bdr2:#C4CAD4;
  --tx:#1A2433;--tx2:#4A5568;--tx3:#8896A5;
}
body{font-family:'IBM Plex Sans Thai Looped',sans-serif;background:var(--bg);color:var(--tx);font-size:13px;min-height:100vh;display:flex;flex-direction:column}

/* ===== TOPBAR ===== */
.topbar{background:var(--PD);color:#fff;padding:0 20px;height:52px;display:flex;align-items:center;gap:14px;flex-shrink:0;position:sticky;top:0;z-index:200}
.tb-back{display:flex;align-items:center;gap:7px;color:rgba(255,255,255,.75);cursor:pointer;font-size:13px;padding:5px 8px;border-radius:6px;transition:.12s}
.tb-back:hover{background:rgba(255,255,255,.1);color:#fff}
.tb-title{font-size:14px;font-weight:700;color:#fff}
.tb-sub{font-size:11.5px;color:rgba(255,255,255,.55)}
.tb-space{flex:1}
.tb-btn{padding:6px 13px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid rgba(255,255,255,.25);display:flex;align-items:center;gap:5px;font-family:inherit;background:rgba(255,255,255,.1);color:#fff;transition:.12s}
.tb-btn:hover{background:rgba(255,255,255,.2)}
.tb-btn.green{background:var(--A);border-color:var(--A)}
.tb-btn:disabled{opacity:.45;cursor:not-allowed}

/* ===== FILTER BAR ===== */
.filter-bar{background:var(--card);border-bottom:1px solid var(--bdr);padding:10px 18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;flex-shrink:0;position:sticky;top:52px;z-index:150}
.fi{padding:6px 10px;border:1px solid var(--bdr);border-radius:7px;font-size:12px;color:var(--tx);background:#fff;font-family:inherit;cursor:pointer}
.fi:focus{outline:none;border-color:var(--P)}
.fi-label{font-size:11.5px;font-weight:600;color:var(--tx2)}
.stat-chip{padding:4px 10px;border-radius:6px;font-size:11.5px;font-weight:600;background:var(--PL);color:var(--P)}
.stat-chip.g{background:var(--AL);color:#065F46}
.col-toggle-wrap{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.col-toggle{padding:4px 10px;border-radius:99px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--bdr);background:var(--bg2);color:var(--tx2);transition:.12s;user-select:none}
.col-toggle.on{background:var(--P);color:#fff;border-color:var(--P)}
.flag-toggle{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--tx2);cursor:pointer;user-select:none}
.flag-toggle input{accent-color:var(--D);width:14px;height:14px}

/* ===== TABLE CONTAINER ===== */
.table-wrap{flex:1;overflow:auto;position:relative}
.tbl{border-collapse:collapse;font-size:11.5px;white-space:nowrap}
.tbl th{background:var(--bg);border-bottom:1px solid var(--bdr);border-right:1px solid var(--bg2);padding:0;position:sticky;top:0;z-index:10;font-weight:700;color:var(--tx2)}
.tbl th .th-inner{padding:6px 10px;display:block}
/* group header row */
.tbl .grp-th{padding:0;border-right:1px solid var(--bdr2);text-align:center;font-size:10.5px;font-weight:700;letter-spacing:.04em;border-top:3px solid transparent;border-bottom:1px solid var(--bdr)}
.grp-meta{background:#F0F4F8;color:var(--P);border-top-color:var(--P)}
.grp-personal{background:#FFF7F0;color:#92400E;border-top-color:#F59E0B}
.grp-consumption{background:#FEF2F2;color:#991B1B;border-top-color:#EF4444}
.grp-nutrition{background:#F0FDF4;color:#065F46;border-top-color:#22C55E}
.grp-activity{background:#EFF6FF;color:#1E40AF;border-top-color:#3B82F6}
.grp-mental{background:#FAF5FF;color:#5B21B6;border-top-color:#8B5CF6}
.grp-loneliness{background:#FFF1F2;color:#9D174D;border-top-color:#EC4899}
.grp-safety{background:#FFFBEB;color:#92400E;border-top-color:#F59E0B}
.grp-environment{background:#F0FDFA;color:#065F46;border-top-color:#14B8A6}
/* sticky cols */
.sticky-0{position:sticky;left:0;z-index:20;background:var(--card)}
.sticky-1{position:sticky;left:44px;z-index:20;background:var(--card)}
.sticky-2{position:sticky;left:180px;z-index:20;background:var(--card)}
.sticky-3{position:sticky;left:300px;z-index:20;background:var(--card)}
th.sticky-0{z-index:30;background:var(--bg)}
th.sticky-1{z-index:30;background:var(--bg)}
th.sticky-2{z-index:30;background:var(--bg)}
th.sticky-3{z-index:30;background:var(--bg)}
.tbl td{padding:6px 10px;border-bottom:1px solid var(--bg2);border-right:1px solid var(--bg2);max-width:200px;overflow:hidden;text-overflow:ellipsis;vertical-align:middle}
.tbl tr:hover td{background:#F8FBFF}
.tbl tr:hover td.sticky-0,.tbl tr:hover td.sticky-1,.tbl tr:hover td.sticky-2,.tbl tr:hover td.sticky-3{background:#F0F6FE}
/* flag row */
.row-flag td{background:#FFF5F5 !important}
.row-flag td.sticky-0,.row-flag td.sticky-1,.row-flag td.sticky-2,.row-flag td.sticky-3{background:#FEECEC !important}
.flag-cell{color:var(--D);font-weight:700}
/* score badges */
.score{padding:1px 6px;border-radius:4px;font-size:10.5px;font-weight:700;display:inline-block}
.s-good{background:#D1FAE5;color:#065F46}
.s-mid{background:#FEF9C3;color:#78350F}
.s-bad{background:#FEE2E2;color:#991B1B}
.s-crit{background:#991B1B;color:#fff}

/* ===== PAGINATION ===== */
.pg-bar{background:var(--card);border-top:1px solid var(--bdr);padding:9px 18px;display:flex;align-items:center;gap:10px;flex-shrink:0;position:sticky;bottom:0;z-index:150}
.pg-info{font-size:12px;color:var(--tx2)}
.pg-btn{padding:5px 11px;border:1px solid var(--bdr);border-radius:6px;font-size:12px;cursor:pointer;background:#fff;font-family:inherit;color:var(--tx2)}
.pg-btn:disabled{opacity:.4;cursor:not-allowed}
.pg-btn.active{background:var(--P);color:#fff;border-color:var(--P)}

/* ===== LOADING / EMPTY ===== */
.overlay{position:fixed;inset:0;background:rgba(255,255,255,.85);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:12px}
.spinner{width:36px;height:36px;border:3px solid var(--bdr);border-top-color:var(--P);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{padding:60px 20px;text-align:center;color:var(--tx3);font-size:14px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--tx);color:#fff;padding:9px 18px;border-radius:8px;font-size:13px;z-index:9999;animation:fadein .2s,fadeout .3s 2.7s forwards}
@keyframes fadein{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes fadeout{to{opacity:0}}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="tb-back" onclick="history.back()">← กลับ</div>
  <div style="width:1px;height:24px;background:rgba(255,255,255,.2)"></div>
  <div>
    <div class="tb-title">💚 Wellbeing Survey — ข้อมูลรายคน</div>
    <div class="tb-sub" id="tb-sub">กำลังโหลด...</div>
  </div>
  <div class="tb-space"></div>
  <a href="admin-wb.html" class="tb-btn" style="text-decoration:none">⚙️ Admin Dashboard</a>
  <div class="tb-btn" onclick="exportExcel()" id="btn-export" disabled>📊 Export Excel</div>
  <div class="tb-btn green" onclick="loadData()">🔄 รีเฟรช</div>
</div>

<!-- FILTER BAR -->
<div class="filter-bar">
  <span class="fi-label">กรอง:</span>
  <select class="fi" id="f-org" onchange="applyFilter()">
    <option value="">ทุกองค์กร</option>
  </select>
  <select class="fi" id="f-gender" onchange="applyFilter()">
    <option value="">ทุกเพศ</option>
    <option value="ชาย">ชาย</option>
    <option value="หญิง">หญิง</option>
    <option value="LGBTQ+">LGBTQ+</option>
  </select>
  <select class="fi" id="f-draft" onchange="applyFilter()">
    <option value="">ทุกสถานะ</option>
    <option value="false">ส่งแล้ว</option>
    <option value="true">Draft</option>
  </select>
  <div style="width:1px;height:22px;background:var(--bdr)"></div>
  <label class="flag-toggle">
    <input type="checkbox" id="f-flag" onchange="applyFilter()">
    แสดงเฉพาะ Flag (TMHI สูง)
  </label>
  <div style="width:1px;height:22px;background:var(--bdr)"></div>
  <span class="fi-label">แสดง Section:</span>
  <div class="col-toggle-wrap" id="col-toggles"></div>
  <div class="tb-space"></div>
  <span class="stat-chip" id="stat-total">0 รายการ</span>
  <span class="stat-chip g" id="stat-flag">Flag: 0</span>
</div>

<!-- TABLE -->
<div class="table-wrap" id="table-wrap">
  <div class="empty" id="empty-msg" style="display:none">ไม่พบข้อมูล</div>
  <table class="tbl" id="main-table" style="display:none"></table>
</div>

<!-- PAGINATION -->
<div class="pg-bar">
  <span class="pg-info" id="pg-info">–</span>
  <div style="flex:1"></div>
  <button class="pg-btn" id="pg-prev" onclick="changePage(-1)" disabled>← ก่อนหน้า</button>
  <div id="pg-pages" style="display:flex;gap:4px"></div>
  <button class="pg-btn" id="pg-next" onclick="changePage(1)" disabled>ถัดไป →</button>
  <select class="fi" id="pg-size" onchange="changePageSize()" style="margin-left:8px">
    <option value="50">50 แถว</option>
    <option value="100">100 แถว</option>
    <option value="200">200 แถว</option>
    <option value="9999">ทั้งหมด</option>
  </select>
</div>

<div class="overlay" id="loading">
  <div class="spinner"></div>
  <div style="font-size:13px;color:var(--tx2)">กำลังโหลดข้อมูลจาก Supabase...</div>
</div>

<script src="js/supabase-config.js"></script>

// =====================================================
// STATE
// =====================================================
let allRows = [];
let filteredRows = [];
let visibleSections = new Set(SECTIONS.map(s=>s.key));
let page = 1;
let pageSize = 50;

// =====================================================
// INIT
// =====================================================
window.addEventListener('DOMContentLoaded', async () => {
  buildColToggles();
  await loadData();
});

async function loadData() {
  showLoading(true);
  try {
    const { data, error } = await sb
      .from('survey_responses')
      .select('id,email,name,title,organization,gender,age,org_type,height,weight,waist,bmi,bmi_category,tmhi_score,tmhi_level,is_draft,submitted_at,raw_responses')
      .order('submitted_at', { ascending: false });

    if (error) throw error;

    allRows = (data || []).map((row, i) => ({
      row_num: i + 1,
      ...row,
      ...(row.raw_responses || {}),
      // ensure top-level columns win over raw_responses duplicates
      email: row.email,
      name: row.name,
      title: row.title,
      organization: row.organization,
      gender: row.gender,
      age: row.age,
      height: row.height,
      weight: row.weight,
      waist: row.waist,
      bmi: row.bmi,
      bmi_category: row.bmi_category,
      tmhi_score: row.tmhi_score,
      tmhi_level: row.tmhi_level,
      is_draft: row.is_draft,
      submitted_at: row.submitted_at,
    }));

    populateOrgFilter();
    applyFilter();
    document.getElementById('btn-export').disabled = false;
  } catch (e) {
    console.error(e);
    showToast('เกิดข้อผิดพลาด: ' + e.message);
    document.getElementById('empty-msg').style.display = 'block';
    document.getElementById('main-table').style.display = 'none';
  }
  showLoading(false);
}

function populateOrgFilter() {
  const orgs = [...new Set(allRows.map(r => r.organization).filter(Boolean))].sort();
  const sel = document.getElementById('f-org');
  orgs.forEach(o => {
    const op = document.createElement('option');
    op.value = o; op.textContent = o;
    sel.appendChild(op);
  });
}

function applyFilter() {
  const org   = document.getElementById('f-org').value;
  const gender= document.getElementById('f-gender').value;
  const draft = document.getElementById('f-draft').value;
  const flagOnly = document.getElementById('f-flag').checked;

  filteredRows = allRows.filter(r => {
    if (org    && r.organization !== org) return false;
    if (gender && r.gender !== gender)   return false;
    if (draft !== '') {
      const isDraft = draft === 'true';
      if (r.is_draft !== isDraft) return false;
    }
    if (flagOnly && !isFlag(r)) return false;
    return true;
  });

  // re-number
  filteredRows.forEach((r,i) => r.row_num = i+1);

  const flagCount = filteredRows.filter(isFlag).length;
  document.getElementById('stat-total').textContent = `${filteredRows.length.toLocaleString()} รายการ`;
  document.getElementById('stat-flag').textContent  = `⚠️ Flag: ${flagCount}`;
  document.getElementById('tb-sub').textContent     =
    `ข้อมูล ${filteredRows.length.toLocaleString()} รายการ (ทั้งหมด ${allRows.length.toLocaleString()})`;

  page = 1;
  renderTable();
}

function isFlag(r) {
  const s = parseFloat(r.tmhi_score);
  return !isNaN(s) && s >= 30; // TMHI สูง = มีความเสี่ยง (ขึ้นกับ scoring — ปรับตามจริง)
}

// =====================================================
// TABLE RENDER
// =====================================================
function renderTable() {
  const tbl = document.getElementById('main-table');
  const empty = document.getElementById('empty-msg');

  const pSize = parseInt(document.getElementById('pg-size').value);
  const start = (page - 1) * pSize;
  const pageRows = filteredRows.slice(start, start + pSize);

  if (filteredRows.length === 0) {
    tbl.style.display = 'none';
    empty.style.display = 'block';
    updatePagination(0);
    return;
  }
  empty.style.display = 'none';
  tbl.style.display = '';

  const activeSections = SECTIONS.filter(s => visibleSections.has(s.key));

  // ---- Build header row 1 (group) ----
  let hRow1 = '<tr>';
  activeSections.forEach(sec => {
    const visibleCols = sec.cols.filter(c => !c.hidden);
    hRow1 += `<th colspan="${visibleCols.length}" class="grp-th ${sec.grpClass}" style="min-width:${visibleCols.reduce((a,c)=>a+(c.width||120),0)}px">
      <div class="th-inner">${sec.label}</div></th>`;
  });
  hRow1 += '</tr>';

  // ---- Build header row 2 (cols) ----
  let hRow2 = '<tr>';
  activeSections.forEach(sec => {
    sec.cols.filter(c=>!c.hidden).forEach(c => {
      const sticky = c.sticky ? `class="${c.sticky}"` : '';
      const tooltip = c.title || c.label;
      hRow2 += `<th ${sticky} style="min-width:${c.width||120}px;max-width:${c.width||120}px">
        <div class="th-inner" title="${tooltip}">${c.label}</div></th>`;
    });
  });
  hRow2 += '</tr>';

  // ---- Build body ----
  let tbody = '';
  pageRows.forEach(row => {
    const flagRow = isFlag(row);
    tbody += `<tr class="${flagRow ? 'row-flag' : ''}">`;
    activeSections.forEach(sec => {
      sec.cols.filter(c=>!c.hidden).forEach(c => {
        const val = row[c.key];
        const sticky = c.sticky ? `class="${c.sticky}"` : '';
        tbody += `<td ${sticky} title="${val ?? ''}">${formatCell(val, c.fmt, c.key, row)}</td>`;
      });
    });
    tbody += '</tr>';
  });

  tbl.innerHTML = `<thead>${hRow1}${hRow2}</thead><tbody>${tbody}</tbody>`;
  updatePagination(filteredRows.length);
}

function formatCell(val, fmt, key, row) {
  if (val === null || val === undefined || val === '') return '<span style="color:#CBD5E1">—</span>';
  switch(fmt) {
    case 'datetime': {
      const d = new Date(val);
      if (isNaN(d)) return val;
      return d.toLocaleDateString('th-TH',{day:'2-digit',month:'short',year:'2-digit'})
        + ' ' + d.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});
    }
    case 'draft':
      return val
        ? '<span style="background:#FEF9C3;color:#78350F;padding:1px 7px;border-radius:4px;font-size:10.5px;font-weight:600">Draft</span>'
        : '<span style="background:#D1FAE5;color:#065F46;padding:1px 7px;border-radius:4px;font-size:10.5px;font-weight:600">ส่งแล้ว</span>';
    case 'num0': return isNaN(parseFloat(val)) ? val : parseFloat(val).toFixed(0);
    case 'num1': return isNaN(parseFloat(val)) ? val : parseFloat(val).toFixed(1);
    case 'arr':
      if (Array.isArray(val)) return val.join(', ') || '—';
      return String(val);
    case 'tmhi': {
      const n = parseFloat(val);
      if (isNaN(n)) return val;
      let cls = 's-good';
      if (n >= 26 && n < 30) cls = 's-mid';
      if (n >= 30) cls = 's-bad';
      if (n >= 35) cls = 's-crit';
      return `<span class="score ${cls}">${n.toFixed(0)}</span>`;
    }
    case 'tmhi_lvl': {
      const map = {'ดีมาก':'s-good','ดี':'s-good','พอใช้':'s-mid','ต่ำกว่าเกณฑ์':'s-bad','ต่ำมาก':'s-crit'};
      const cls = map[val] || '';
      return cls ? `<span class="score ${cls}">${val}</span>` : val;
    }
    default: {
      const s = String(val);
      // highlight if flag field
      if (key === 'tmhi_score' || key === 'tmhi_level') return formatCell(val, key === 'tmhi_score' ? 'tmhi' : 'tmhi_lvl', key, row);
      return s.length > 40 ? `<span title="${s}">${s.substring(0,38)}…</span>` : s;
    }
  }
}

// =====================================================
// PAGINATION
// =====================================================
function updatePagination(total) {
  const pSize = parseInt(document.getElementById('pg-size').value);
  const totalPages = Math.ceil(total / pSize) || 1;
  const start = Math.min((page-1)*pSize+1, total);
  const end   = Math.min(page*pSize, total);

  document.getElementById('pg-info').textContent = `แสดง ${start.toLocaleString()}–${end.toLocaleString()} จาก ${total.toLocaleString()} รายการ`;
  document.getElementById('pg-prev').disabled = page <= 1;
  document.getElementById('pg-next').disabled = page >= totalPages;

  const container = document.getElementById('pg-pages');
  container.innerHTML = '';
  const pages = getPageRange(page, totalPages);
  pages.forEach(p => {
    if (p === '…') {
      const span = document.createElement('span');
      span.textContent = '…';
      span.style.cssText = 'padding:5px 4px;color:var(--tx3);font-size:12px';
      container.appendChild(span);
    } else {
      const btn = document.createElement('button');
      btn.className = 'pg-btn' + (p === page ? ' active' : '');
      btn.textContent = p;
      btn.onclick = () => { page = p; renderTable(); };
      container.appendChild(btn);
    }
  });
}

function getPageRange(cur, total) {
  if (total <= 7) return Array.from({length:total},(_,i)=>i+1);
  const r = [1];
  if (cur > 3) r.push('…');
  for (let i=Math.max(2,cur-1); i<=Math.min(total-1,cur+1); i++) r.push(i);
  if (cur < total-2) r.push('…');
  r.push(total);
  return [...new Set(r)];
}

function changePage(dir) {
  const pSize = parseInt(document.getElementById('pg-size').value);
  const totalPages = Math.ceil(filteredRows.length / pSize) || 1;
  page = Math.max(1, Math.min(page + dir, totalPages));
  renderTable();
}

function changePageSize() {
  page = 1;
  renderTable();
}

// =====================================================
// COLUMN TOGGLES
// =====================================================
function buildColToggles() {
  const wrap = document.getElementById('col-toggles');
  SECTIONS.forEach(sec => {
    const btn = document.createElement('div');
    btn.className = 'col-toggle on';
    btn.dataset.key = sec.key;
    btn.textContent = sec.label.split(' ')[0] + (sec.label.match(/\d+/) ? ' '+sec.label.match(/\d+/)[0] : '');
    btn.onclick = () => toggleSection(sec.key, btn);
    wrap.appendChild(btn);
  });
}

function toggleSection(key, btn) {
  if (visibleSections.has(key)) {
    if (visibleSections.size === 1) return; // keep at least 1
    visibleSections.delete(key);
    btn.classList.remove('on');
  } else {
    visibleSections.add(key);
    btn.classList.add('on');
  }
  renderTable();
}

// =====================================================
// EXPORT EXCEL
// =====================================================
function exportExcel() {
  if (!filteredRows.length) return;
  showToast('กำลังสร้าง Excel...');

  const activeSections = SECTIONS.filter(s => visibleSections.has(s.key));

  // header row 1 (group labels)
  const hdr1 = [];
  activeSections.forEach(sec => {
    sec.cols.filter(c=>!c.hidden).forEach((c, i) => {
      hdr1.push(i === 0 ? sec.label : '');
    });
  });

  // header row 2 (col labels)
  const hdr2 = [];
  activeSections.forEach(sec => {
    sec.cols.filter(c=>!c.hidden).forEach(c => hdr2.push(c.label));
  });

  // data rows
  const dataRows = filteredRows.map(row => {
    const r = [];
    activeSections.forEach(sec => {
      sec.cols.filter(c=>!c.hidden).forEach(c => {
        let v = row[c.key];
        if (Array.isArray(v)) v = v.join(', ');
        else if (v === null || v === undefined) v = '';
        r.push(v);
      });
    });
    return r;
  });

  const ws = XLSX.utils.aoa_to_sheet([hdr1, hdr2, ...dataRows]);
  // merge group header cells
  const merges = [];
  let colIdx = 0;
  activeSections.forEach(sec => {
    const len = sec.cols.filter(c=>!c.hidden).length;
    if (len > 1) merges.push({s:{r:0,c:colIdx},e:{r:0,c:colIdx+len-1}});
    colIdx += len;
  });
  ws['!merges'] = merges;
  ws['!cols'] = [];
  activeSections.forEach(sec => {
    sec.cols.filter(c=>!c.hidden).forEach(c => ws['!cols'].push({wch: Math.round((c.width||120)/6.5)}));
  });

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Wellbeing Raw Data');
  const date = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `wellbeing_rawdata_${date}.xlsx`);
  showToast('Export สำเร็จ ✓');
}

// =====================================================
// HELPERS
// =====================================================
function showLoading(v) {
  document.getElementById('loading').style.display = v ? 'flex' : 'none';
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3200);
}
