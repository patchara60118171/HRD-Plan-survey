<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบสำรวจสุขภาวะบุคลากร | Individual Well-being Survey</title>
    <meta name="description"
        content="แบบสำรวจสุขภาวะบุคลากร 4 มิติ: กาย ใจ สังคม และสภาพแวดล้อม ตามคู่มือการประเมินรางวัลองค์กรสุขภาวะแห่งชาติ">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai+Looped:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">


    <!-- SheetJS for Excel Export -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-screen">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <p>กำลังโหลด...</p>
        </div>
    </div>

    <!-- Main App Container -->
    <div id="app" class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <img src="assets/logo.png" alt="Happy Workplace" style="height: 40px;">
                    <span class="logo-text">Happy Workplace Survey</span>
                </div>
                <div class="user-section" id="user-section">
                    <!-- User profile or login button will be inserted here -->
                </div>
            </div>
        </header>

        <!-- Progress Bar -->
        <div class="progress-container" id="progress-container" style="display: none;">
            <div class="progress-header">
                <div class="progress-badge">IN PROGRESS</div>
                <div class="progress-text" id="progress-text">0%</div>
            </div>
            <div class="survey-progress-bar">
                <div class="survey-progress-fill" id="progress-fill"></div>
            </div>
        </div>

        <!-- Main Content -->
        <main class="main-content" id="main-content">
            <!-- Survey content will be dynamically inserted here -->
        </main>

        <!-- Navigation -->
        <nav class="nav-buttons" id="nav-buttons" style="display: none;">
            <button class="btn btn-secondary" id="btn-prev">
                <span class="btn-icon">←</span> ย้อนกลับ
            </button>
            <button class="btn btn-primary" id="btn-next">
                ถัดไป <span class="btn-icon">→</span>
            </button>
        </nav>

        <!-- Footer -->
        <footer class="footer">
            <p>แบบฟอร์มการประเมินสถานการณ์ด้านสุขภาพคนวัยทำงาน</p>
        </footer>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <!-- Scripts -->
    <script src="js/questions.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/components.js"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
