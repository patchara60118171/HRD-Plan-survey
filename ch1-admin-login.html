<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CH1 Admin - เข้าสู่ระบบ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai+Looped:wght@300;400;600;700&display=swap');

        body {
            font-family: 'IBM Plex Sans Thai Looped', sans-serif;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(16px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .fade-up {
            animation: fadeUp .5s ease;
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, .3);
            border-top-color: #fff;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            animation: spin .6s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }
    </style>
</head>

<body class="min-h-screen bg-gradient-to-br from-slate-900 via-blue-950 to-indigo-950 flex items-center justify-center p-4">

    <script src="js/supabase-config.js"></script>
    <script>
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        (async () => {
            const { data: { session } } = await sb.auth.getSession();
            if (session) {
                window.location.href = 'ch1-admin.html';
            }
        })();
    </script>

    <div class="w-full max-w-md fade-up">
        <div class="absolute inset-0 flex items-center justify-center pointer-events-none" aria-hidden="true">
            <div class="w-96 h-96 bg-blue-500/10 rounded-full blur-3xl"></div>
        </div>

        <div class="relative bg-white/5 backdrop-blur-xl border border-white/10 rounded-3xl shadow-2xl p-8">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-500/25">
                    <span class="text-white text-2xl font-bold">C1</span>
                </div>
                <h1 class="text-2xl font-bold text-white">CH1 Admin Login</h1>
                <p class="text-sm text-blue-200/60 mt-1">เข้าสู่ระบบสำหรับ Dashboard บทที่ 1</p>
            </div>

            <form id="login-form" onsubmit="handleLogin(event)" class="space-y-5">
                <div>
                    <label class="text-xs font-semibold text-blue-200/70 uppercase tracking-wider block mb-2">อีเมลผู้ดูแลระบบ</label>
                    <input type="email" id="email" required placeholder="admin@example.com"
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3.5 text-sm text-white placeholder-white/30 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500/50 transition" />
                </div>
                <div>
                    <label class="text-xs font-semibold text-blue-200/70 uppercase tracking-wider block mb-2">รหัสผ่าน</label>
                    <input type="password" id="password" required placeholder="••••••••"
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3.5 text-sm text-white placeholder-white/30 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500/50 transition" />
                </div>

                <div id="error-box" class="bg-red-500/10 border border-red-500/20 rounded-xl px-4 py-3 text-sm text-red-300" style="display:none">
                    <span id="error-text"></span>
                </div>

                <button type="submit" id="btn-login"
                    class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white rounded-xl py-3.5 font-semibold text-sm shadow-lg shadow-blue-600/25 hover:shadow-blue-500/40 transition disabled:opacity-50 disabled:cursor-not-allowed">
                    เข้าสู่ระบบ
                </button>
            </form>

            <div class="mt-6 text-center">
                <a href="ch1.html" class="text-xs text-blue-300/40 hover:text-blue-300/70 transition">← กลับไปหน้าทำแบบสอบถามองค์กร (บทที่ 1)</a>
            </div>
        </div>
    </div>

    <script>
        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-login');
            const errBox = document.getElementById('error-box');
            const errText = document.getElementById('error-text');
            errBox.style.display = 'none';

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                errText.textContent = 'กรุณากรอกอีเมลและรหัสผ่าน';
                errBox.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> กำลังเข้าสู่ระบบ...';

            try {
                const { error } = await sb.auth.signInWithPassword({ email, password });
                if (error) throw error;
                window.location.href = 'ch1-admin.html';
            } catch (err) {
                btn.disabled = false;
                btn.textContent = 'เข้าสู่ระบบ';
                errText.textContent = err.message === 'Invalid login credentials'
                    ? 'อีเมลหรือรหัสผ่านไม่ถูกต้อง'
                    : (err.message || 'เกิดข้อผิดพลาด กรุณาลองใหม่');
                errBox.style.display = 'block';
            }
        }
    </script>
</body>

</html>
