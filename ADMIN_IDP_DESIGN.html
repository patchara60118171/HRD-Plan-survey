<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Well-being Survey · Admin Portal</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai+Looped:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="colors_and_type.css">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: #F8FAFC;
    font-family: 'IBM Plex Sans Thai Looped', sans-serif;
    color: #1E293B;
    -webkit-font-smoothing: antialiased;
    line-height: 1.55;
    font-size: 14px;
  }
  button { font-family: inherit; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: #CBD5E1; }

  .scr { animation: fadeIn .25s ease-out; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<body>
<div id="root"></div>

const { useState } = React;

const C = {

  amber: '#F59E0B', amberLight: '#FEF3C7',
  red: '#EF4444', redLight: '#FEE2E2',
  orange: '#F97316', orangeLight: '#FFEDD5',
  yellow: '#EAB308', yellowLight: '#FEF9C3',
  purple: '#8B5CF6', purpleLight: '#EDE9FE',
  cyan: '#06B6D4',
  bg: '#F8FAFC', card: '#FFFFFF', hover: '#F1F5F9',
  border: '#E2E8F0', borderStrong: '#CBD5E1',

};

// ===== Sidebar (cloned) =====

      { id: 'submission', emj: '📈', label: 'สถานะการส่งข้อมูล' },
    ],
  },
  {
    head: 'ข้อมูลองค์กร',
    items: [
      { id: 'orgs', emj: '🏢', label: 'องค์กรที่เข้าร่วม' },
      { id: 'org-form', emj: '📋', label: 'ฟอร์มแบบสำรวจข้อมูลองค์กร' },
      { id: 'wellbeing', emj: '🌿', label: 'Wellbeing Survey' },
    ],
  },
  {
    head: 'รายงานข้อมูล',
    items: [
      { id: 'summary-org', emj: '📑', label: 'สรุปภาพรวมแบบสำรวจข้อมูลองค์กร' },
      { id: 'analyze', emj: '📊', label: 'วิเคราะห์ Wellbeing' },
      { id: 'idp', emj: '🎯', label: 'แผนพัฒนาบุคลากร (IDP)' },
      { id: 'compare', emj: '🔀', label: 'เปรียบเทียบองค์กร' },
      { id: 'export', emj: '📥', label: 'Export รายงาน' },
    ],
  },
];

function Sidebar({ active, onSelect }) {
  return (
    <aside style={{
      width: 248, background: '#fff', borderRight: `1px solid ${C.border}`,
      display: 'flex', flexDirection: 'column', position: 'sticky', top: 0, height: '100vh', flexShrink: 0,
    }}>
      {/* Brand */}
      <div style={{ padding: '14px 16px', borderBottom: `1px solid ${C.border}`, display: 'flex', alignItems: 'center', gap: 10 }}>
        <div style={{ width: 36, height: 36, borderRadius: 10, background: 'linear-gradient(135deg,#0D9488,#3B82F6)', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontSize: 16, fontWeight: 700 }}>🌿</div>
        <div style={{ minWidth: 0 }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: C.text, lineHeight: 1.2 }}>Well-being Survey</div>
          <div style={{ fontSize: 11.5, fontWeight: 600, color: C.textSec, lineHeight: 1.2 }}>Admin Portal</div>
          <div style={{ fontSize: 10, color: C.textMuted, lineHeight: 1.3, marginTop: 2 }}>ระบบประมวลผลแบบสำรวจสุขภาวะภาครัฐ</div>
        </div>
      </div>

      {/* User card */}
      <div style={{ padding: 12, borderBottom: `1px solid ${C.border}` }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '8px 10px', background: C.hover, borderRadius: 10 }}>

          </div>
        </div>
      </div>

      <nav style={{ padding: '8px 10px', flex: 1, overflowY: 'auto' }}>
        {SIDEBAR_GROUPS.map((g, gi) => (
          <div key={gi} style={{ marginBottom: 12 }}>
            <div style={{ fontSize: 10, color: C.textMuted, fontWeight: 700, letterSpacing: '.08em', textTransform: 'uppercase', padding: '8px 10px 4px' }}>{g.head}</div>
            {g.items.map(it => {
              const on = active === it.id;
              return (
                <button key={it.id} onClick={() => onSelect(it.id)} style={{
                  display: 'flex', alignItems: 'center', gap: 10, width: '100%',
                  padding: '8px 10px', marginBottom: 1,
                  background: on ? C.navyLight : 'transparent',
                  color: on ? C.navy : '#475569',
                  border: 'none', borderRadius: 8,
                  fontFamily: 'inherit', fontSize: 13,
                  fontWeight: on ? 600 : 500,
                  cursor: 'pointer', textAlign: 'left',
                  transition: 'background 150ms ease',

            })}
          </div>
        ))}

      <div style={{ padding: 12, borderTop: `1px solid ${C.border}` }}>
        <button style={{
          width: '100%', padding: '8px 10px', background: 'transparent',
          border: `1px solid ${C.redLight}`, borderRadius: 8,
          color: C.red, fontSize: 12.5, fontWeight: 600, cursor: 'pointer',
          display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6,

// ===== Top breadcrumb bar =====
function TopBar() {
  return (
    <div style={{
      background: '#fff', borderBottom: `1px solid ${C.border}`,
      padding: '10px 24px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 16,
    }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 13 }}>
        <span style={{ color: C.navy, fontWeight: 600 }}>แผนพัฒนาบุคลากร (IDP)</span>
        <span style={{ color: C.textMuted }}>/ Dashboard</span>
      </div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
        <span style={{ fontSize: 12, color: C.green, fontWeight: 600 }}>● เชื่อมต่อสำเร็จ</span>
        <button style={{ padding: '6px 12px', background: '#fff', border: `1px solid ${C.border}`, borderRadius: 6, fontSize: 12, fontWeight: 500, cursor: 'pointer', color: C.text }}>↻ รีเฟรช</button>
      </div>

}

// ===== Hero Banner =====
function HeroBanner({ tab, onTab }) {
  const TABS = [
    { id: 'exec', label: 'Executive', emj: '📊' },
    { id: 'phys', label: 'Physical', emj: '💪' },
    { id: 'mental', label: 'Mental (TMHI)', emj: '🧠' },
    { id: 'social', label: 'Social (UCLA)', emj: '👥' },
    { id: 'env', label: 'Environment', emj: '🌿' },
  ];
  return (
    <div style={{
      background: `linear-gradient(135deg, ${C.heroFrom} 0%, ${C.heroTo} 100%)`,
      padding: '28px 32px 0', color: '#fff', position: 'relative',
    }}>
      <div style={{ fontSize: 11, letterSpacing: '.18em', color: '#A5B4D7', fontWeight: 600, marginBottom: 6 }}>
        NIDA · WELL-BEING SURVEY
      </div>
      <h1 style={{ margin: 0, fontSize: 28, fontWeight: 700, color: '#fff' }}>IDP Dashboard</h1>
      <p style={{ margin: '6px 0 0', fontSize: 13, color: '#CBD5E1' }}>
        รายงาน 5 มิติสุขภาวะ · ข้อมูลจริงจาก Supabase (4,707 คน)
      </p>
      <div style={{ display: 'flex', gap: 4, marginTop: 22, borderBottom: '1px solid rgba(255,255,255,.12)' }}>
        {TABS.map(t => {
          const on = tab === t.id;
          return (
            <button key={t.id} onClick={() => onTab(t.id)} style={{
              padding: '10px 18px',
              background: on ? '#fff' : 'transparent',
              color: on ? C.navy : '#CBD5E1',
              border: 'none', borderRadius: '8px 8px 0 0',
              fontFamily: 'inherit', fontSize: 13, fontWeight: 600,
              cursor: 'pointer',
              display: 'flex', alignItems: 'center', gap: 6,
            }}>
              <span>{t.emj}</span> {t.label}
            </button>
          );
        })}
      </div>
    </div>
  );
}

// ===== Radar chart (SVG) =====
function RadarChart() {
  // 4 axes: กาย, ใจ, สังคม, แวดล้อม
  const cx = 150, cy = 140, R = 100;
  const pts = [
    { angle: -90, label: '🏃 กาย', emj: '' },
    { angle: 0, label: '🧠 ใจ', emj: '' },
    { angle: 90, label: '👥 สังคม', emj: '' },
    { angle: 180, label: '🌿 แวดล้อม', emj: '' },
  ];
  const polar = (angleDeg, r) => {
    const a = angleDeg * Math.PI / 180;
    return [cx + r * Math.cos(a), cy + r * Math.sin(a)];
  };

  // Group A (high risk) values out of 1
  const gA = [0.85, 0.55, 0.15, 0.45];
  const gOrg = [0.33, 0.20, 0.03, 0.19];

  const polyA = pts.map((p, i) => polar(p.angle, R * gA[i]).join(',')).join(' ');
  const polyOrg = pts.map((p, i) => polar(p.angle, R * gOrg[i]).join(',')).join(' ');

  const ringRadii = [0.25, 0.5, 0.75, 1];

  return (
    <svg viewBox="0 0 300 280" style={{ width: '100%', height: 'auto', maxHeight: 320 }}>
      {/* Rings */}
      {ringRadii.map(r => {
        const ringPts = pts.map(p => polar(p.angle, R * r).join(',')).join(' ');
        return <polygon key={r} points={ringPts} fill="none" stroke="#E2E8F0" strokeDasharray="2 3" />;
      })}
      {/* Axes */}
      {pts.map((p, i) => {
        const [x, y] = polar(p.angle, R);
        return <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke="#E2E8F0" />;
      })}
      {/* Org polygon (background) */}
      <polygon points={polyOrg} fill="rgba(59,130,246,.18)" stroke="#3B82F6" strokeWidth="1.5" />
      {pts.map((p, i) => {
        const [x, y] = polar(p.angle, R * gOrg[i]);
        return <circle key={i} cx={x} cy={y} r="3" fill="#3B82F6" />;
      })}
      {/* Group A polygon (front) */}
      <polygon points={polyA} fill="rgba(239,68,68,.22)" stroke="#EF4444" strokeWidth="1.8" />
      {pts.map((p, i) => {
        const [x, y] = polar(p.angle, R * gA[i]);
        return <circle key={i} cx={x} cy={y} r="3.5" fill="#EF4444" />;
      })}
      {/* Labels */}
      {pts.map((p, i) => {
        const [x, y] = polar(p.angle, R + 22);
        return <text key={i} x={x} y={y} fontSize="11" fontWeight="600" fill="#475569" textAnchor="middle" dominantBaseline="middle" fontFamily="IBM Plex Sans Thai Looped">{p.label}</text>;
      })}
    </svg>
  );
}
