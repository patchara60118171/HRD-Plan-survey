<!DOCTYPE html>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap');

        body {
            font-family: 'Sarabun', sans-serif;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(10px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .fade-up {
            animation: fadeUp .4s ease
        }

        .tab-btn {
            transition: all .2s
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #2563eb, #4338ca);
            color: #fff;
            box-shadow: 0 4px 12px rgba(37, 99, 235, .25)
        }

        .severity-1,
        .severity-2 {
            background: #dcfce7;
            color: #15803d
        }

        .severity-3 {
            background: #fef9c3;
            color: #a16207
        }

        .severity-4,
        .severity-5 {
            background: #fee2e2;
            color: #dc2626
        }

        .hrd-yes {
            background: #dcfce7;
            color: #15803d
        }

        .hrd-inprogress {
            background: #fef9c3;
            color: #a16207
        }

        .hrd-no {
            background: #fee2e2;
            color: #dc2626
        }

        .spinner-page {
            border: 4px solid rgba(37, 99, 235, .15);
            border-top-color: #2563eb;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin .7s linear infinite
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        table th {
            position: sticky;
            top: 0;
            z-index: 1
        }

        .progress-fill {
            transition: width .6s ease
        }
    </style>
</head>

    <script>
        // ============ AUTH ============
        async function checkAuth() {
            const { data: { session } } = await sb.auth.getSession();
            if (!session) { window.location.href = 'admin-login.html'; return null; }
            return session;
        }

        async function logout() {
            await sb.auth.signOut();
            localStorage.clear();
            window.location.href = 'admin-login.html';
        }

        // ============ DATA ============
        async function loadData() {
            const { data, error } = await sb.from('survey_responses').select('*').order('submitted_at', { ascending: false });
            if (error) { console.error(error); return []; }
            return data || [];
        }

        // ============ KPI ============
        function renderKPI(data) {
            const total = data.length;
            const orgs = [...new Set(data.map(r => r.organization))].length;
            const avgSev = total ? (data.reduce((s, r) => s + (r.severity_score || 0), 0) / total).toFixed(1) : '0';
            const pending = 15 - orgs;

            document.getElementById('kpi-cards').innerHTML = `
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 hover:shadow-md transition">
      <div class="flex items-center justify-between mb-2"><span class="text-2xl">📝</span><span class="text-xs font-semibold text-blue-600 bg-blue-50 px-2 py-1 rounded-lg">ส่งแล้ว</span></div>
      <p class="text-3xl font-bold text-gray-800">${total}</p><p class="text-xs text-gray-400 mt-1">การตอบแบบสอบถาม</p>
    </div>
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 hover:shadow-md transition">
      <div class="flex items-center justify-between mb-2"><span class="text-2xl">🏢</span><span class="text-xs font-semibold text-green-600 bg-green-50 px-2 py-1 rounded-lg">${orgs}/15</span></div>
      <p class="text-3xl font-bold text-gray-800">${orgs}</p><p class="text-xs text-gray-400 mt-1">หน่วยงานที่ตอบแล้ว</p>
    </div>
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 hover:shadow-md transition">
      <div class="flex items-center justify-between mb-2"><span class="text-2xl">⚠️</span><span class="text-xs font-semibold ${Number(avgSev) >= 4 ? 'text-red-600 bg-red-50' : Number(avgSev) >= 3 ? 'text-yellow-600 bg-yellow-50' : 'text-green-600 bg-green-50'} px-2 py-1 rounded-lg">${avgSev}/5</span></div>
      <p class="text-3xl font-bold text-gray-800">${avgSev}</p><p class="text-xs text-gray-400 mt-1">ระดับปัญหาเฉลี่ย</p>
    </div>
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 hover:shadow-md transition">
      <div class="flex items-center justify-between mb-2"><span class="text-2xl">⏳</span><span class="text-xs font-semibold ${pending > 0 ? 'text-orange-600 bg-orange-50' : 'text-green-600 bg-green-50'} px-2 py-1 rounded-lg">${pending > 0 ? 'รอ' : 'ครบ!'}</span></div>
      <p class="text-3xl font-bold text-gray-800">${pending}</p><p class="text-xs text-gray-400 mt-1">ยังไม่ได้ตอบ</p>
    </div>`;
        }

        // ============ TAB: OVERVIEW ============
        function renderOverview(data) {
            const answeredOrgs = [...new Set(data.map(r => r.organization))];
            const pendingOrgs = ALL_ORGS.filter(o => !answeredOrgs.includes(o));

            // Issue frequency
            const issueCounts = {};
            data.forEach(r => (r.health_issues || []).forEach(i => { issueCounts[i] = (issueCounts[i] || 0) + 1; }));
            const topIssues = Object.entries(issueCounts).sort((a, b) => b[1] - a[1]).slice(0, 6);

            let html = `
    <div class="grid lg:grid-cols-2 gap-6">
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
        <h3 class="text-sm font-bold text-gray-700 mb-4">📊 ปัญหาสุขภาพที่พบบ่อย</h3>
        <canvas id="chart-issues" height="200"></canvas>
      </div>
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
        <h3 class="text-sm font-bold text-gray-700 mb-4">🏢 สถานะการตอบ (${answeredOrgs.length}/15)</h3>
        <div class="space-y-2 max-h-64 overflow-y-auto pr-2">`;

            ALL_ORGS.forEach(org => {
                const answered = answeredOrgs.includes(org);
                html += `<div class="flex items-center gap-2 py-1.5 px-3 rounded-lg ${answered ? 'bg-green-50' : 'bg-gray-50'}">
      <span class="text-sm ${answered ? 'text-green-600' : 'text-gray-400'}">${answered ? '✅' : '⏳'}</span>
      <span class="text-xs ${answered ? 'text-gray-700' : 'text-gray-400'} truncate">${org}</span></div>`;
            });

            html += `</div></div></div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 mt-6">
      <h3 class="text-sm font-bold text-gray-700 mb-4">📋 ข้อมูลล่าสุดที่ส่งเข้ามา</h3>
      <div class="overflow-x-auto"><table class="w-full text-xs">
        <thead><tr class="bg-gray-50"><th class="text-left px-3 py-2 font-semibold text-gray-500">หน่วยงาน</th><th class="text-right px-3 py-2 font-semibold text-gray-500">บุคลากร</th><th class="text-right px-3 py-2 font-semibold text-gray-500">NCD</th><th class="text-center px-3 py-2 font-semibold text-gray-500">ความรุนแรง</th><th class="text-right px-3 py-2 font-semibold text-gray-500">วันที่ส่ง</th></tr></thead>
        <tbody>`;

            data.slice(0, 10).forEach(r => {
                html += `<tr class="border-t border-gray-50 hover:bg-gray-50">
      <td class="px-3 py-2.5 text-gray-700 max-w-[200px] truncate">${r.organization}</td>
      <td class="px-3 py-2.5 text-right text-gray-600">${r.total_staff?.toLocaleString() || '-'}</td>
      <td class="px-3 py-2.5 text-right text-gray-600">${r.ncd_count || '-'}</td>
      <td class="px-3 py-2.5 text-center"><span class="severity-${r.severity_score} text-xs font-semibold px-2 py-0.5 rounded-full">${r.severity_score}/5</span></td>
      <td class="px-3 py-2.5 text-right text-gray-400">${r.submitted_at ? new Date(r.submitted_at).toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: '2-digit' }) : '-'}</td>
    </tr>`;
            });
            html += `</tbody></table></div></div>`;

            document.getElementById('tab-overview').innerHTML = html;

            // Chart
            if (topIssues.length > 0) {
                const ctx = document.getElementById('chart-issues');
                if (ctx) { new Chart(ctx, { type: 'bar', data: { labels: topIssues.map(([k]) => k.length > 20 ? k.slice(0, 20) + '…' : k), datasets: [{ label: 'จำนวนหน่วยงาน', data: topIssues.map(([, v]) => v), backgroundColor: 'rgba(37,99,235,0.7)', borderRadius: 8, barThickness: 28 }] }, options: { indexAxis: 'y', responsive: true, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false }, ticks: { stepSize: 1 } }, y: { grid: { display: false } } } } }); }
            }
        }

        // ============ TAB: ORGS ============
        function renderOrgs(data) {
            let html = `<div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
    <div class="flex items-center justify-between mb-4">
      <h3 class="text-sm font-bold text-gray-700">🏢 รายละเอียดทุกหน่วยงาน</h3>
      <input type="text" id="org-search" placeholder="🔍 ค้นหาหน่วยงาน..." oninput="filterOrgs()" class="border border-gray-200 rounded-xl px-3 py-2 text-xs w-48 focus:outline-none focus:ring-2 focus:ring-blue-300" />
    </div>
    <div class="overflow-x-auto"><table class="w-full text-xs" id="org-table">
      <thead><tr class="bg-gray-50">
        <th class="text-left px-3 py-2.5 font-semibold text-gray-500 cursor-pointer" onclick="sortTable(0)">หน่วยงาน ↕</th>
        <th class="text-right px-3 py-2.5 font-semibold text-gray-500 cursor-pointer" onclick="sortTable(1)">บุคลากร ↕</th>
        <th class="text-right px-3 py-2.5 font-semibold text-gray-500 cursor-pointer" onclick="sortTable(2)">NCD ↕</th>
        <th class="text-right px-3 py-2.5 font-semibold text-gray-500">สัดส่วน NCD</th>
        <th class="text-left px-3 py-2.5 font-semibold text-gray-500">ปัญหาหลัก</th>
        <th class="text-center px-3 py-2.5 font-semibold text-gray-500 cursor-pointer" onclick="sortTable(5)">ความรุนแรง ↕</th>
        <th class="text-center px-3 py-2.5 font-semibold text-gray-500">HRD</th>
        <th class="text-right px-3 py-2.5 font-semibold text-gray-500">วันที่ส่ง</th>
      </tr></thead><tbody id="org-tbody">`;

            data.forEach(r => {
                const hrdClass = r.hrd_plan_status === 'yes' ? 'hrd-yes' : r.hrd_plan_status === 'inprogress' ? 'hrd-inprogress' : 'hrd-no';
                const hrdLabel = r.hrd_plan_status === 'yes' ? 'มี' : r.hrd_plan_status === 'inprogress' ? 'กำลังทำ' : 'ไม่มี';
                const issues = (r.health_issues || []).map(i => i.length > 15 ? i.slice(0, 15) + '…' : i).join(', ');
                html += `<tr class="border-t border-gray-50 hover:bg-blue-50/40 org-row" data-org="${r.organization}">
      <td class="px-3 py-2.5 text-gray-700 font-medium max-w-[180px] truncate">${r.organization}</td>
      <td class="px-3 py-2.5 text-right text-gray-600">${r.total_staff?.toLocaleString() || '-'}</td>
      <td class="px-3 py-2.5 text-right text-gray-600">${r.ncd_count ?? '-'}</td>
      <td class="px-3 py-2.5 text-right text-gray-600">${r.ncd_ratio_pct != null ? r.ncd_ratio_pct + '%' : '-'}</td>
      <td class="px-3 py-2.5 text-gray-500 max-w-[200px] truncate">${issues || '-'}</td>
      <td class="px-3 py-2.5 text-center"><span class="severity-${r.severity_score} text-xs font-semibold px-2 py-0.5 rounded-full">${r.severity_score}/5</span></td>
      <td class="px-3 py-2.5 text-center"><span class="${hrdClass} text-xs font-semibold px-2 py-0.5 rounded-full">${hrdLabel}</span></td>
      <td class="px-3 py-2.5 text-right text-gray-400">${r.submitted_at ? new Date(r.submitted_at).toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: '2-digit' }) : '-'}</td>
    </tr>`;
            });
            html += `</tbody></table></div></div>`;
            document.getElementById('tab-orgs').innerHTML = html;
        }

        function filterOrgs() {
            const q = document.getElementById('org-search').value.toLowerCase();
            document.querySelectorAll('.org-row').forEach(row => {
                row.style.display = row.dataset.org.toLowerCase().includes(q) ? '' : 'none';
            });
        }

        let sortDir = 1;
        function sortTable(col) {
            const tbody = document.getElementById('org-tbody');
            const rows = [...tbody.querySelectorAll('tr')];
            rows.sort((a, b) => {
                const aVal = a.children[col].textContent.trim();
                const bVal = b.children[col].textContent.trim();
                const aNum = parseFloat(aVal.replace(/[^0-9.-]/g, ''));
                const bNum = parseFloat(bVal.replace(/[^0-9.-]/g, ''));
                if (!isNaN(aNum) && !isNaN(bNum)) return (aNum - bNum) * sortDir;
                return aVal.localeCompare(bVal, 'th') * sortDir;
            });
            sortDir *= -1;
            rows.forEach(r => tbody.appendChild(r));
        }

        // ============ TAB: HEALTH ============
        function renderHealth(data) {
            const issueCounts = {};
            const issueSeverity = {};
            data.forEach(r => (r.health_issues || []).forEach(i => {
                issueCounts[i] = (issueCounts[i] || 0) + 1;
                issueSeverity[i] = (issueSeverity[i] || []);
                issueSeverity[i].push(r.severity_score || 0);
            }));
            const sorted = Object.entries(issueCounts).sort((a, b) => b[1] - a[1]);

            let html = `<div class="grid lg:grid-cols-2 gap-6">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
      <h3 class="text-sm font-bold text-gray-700 mb-4">📊 ปัญหาสุขภาพ – จำนวนหน่วยงาน</h3>
      <canvas id="chart-health-bar" height="220"></canvas>
    </div>
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
      <h3 class="text-sm font-bold text-gray-700 mb-4">🍩 สัดส่วนปัญหา</h3>
      <canvas id="chart-health-donut" height="220"></canvas>
    </div>
  </div>
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 mt-6">
    <h3 class="text-sm font-bold text-gray-700 mb-4">📋 รายละเอียดปัญหาสุขภาพ</h3>
    <div class="space-y-3">`;

            sorted.forEach(([issue, count]) => {
                const avgSev = (issueSeverity[issue].reduce((a, b) => a + b, 0) / issueSeverity[issue].length).toFixed(1);
                const pct = Math.round((count / Math.max(data.length, 1)) * 100);
                html += `<div>
      <div class="flex items-center justify-between mb-1">
        <span class="text-xs font-semibold text-gray-700">${issue}</span>
        <span class="text-xs text-gray-400">${count} หน่วยงาน · เฉลี่ย ${avgSev}/5</span>
      </div>
      <div class="w-full bg-gray-100 rounded-full h-2.5"><div class="progress-fill bg-gradient-to-r from-blue-500 to-indigo-500 h-2.5 rounded-full" style="width:${pct}%"></div></div>
    </div>`;
            });
            html += `</div></div>`;
            document.getElementById('tab-health').innerHTML = html;

            // Charts
            const colors = ['#3b82f6', '#6366f1', '#8b5cf6', '#a855f7', '#ec4899', '#f97316', '#14b8a6', '#22c55e'];
            if (sorted.length > 0) {
                new Chart(document.getElementById('chart-health-bar'), { type: 'bar', data: { labels: sorted.map(([k]) => k.length > 18 ? k.slice(0, 18) + '…' : k), datasets: [{ label: 'หน่วยงาน', data: sorted.map(([, v]) => v), backgroundColor: colors.slice(0, sorted.length), borderRadius: 8, barThickness: 24 }] }, options: { indexAxis: 'y', responsive: true, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false }, ticks: { stepSize: 1 } }, y: { grid: { display: false } } } } });
                new Chart(document.getElementById('chart-health-donut'), { type: 'doughnut', data: { labels: sorted.map(([k]) => k), datasets: [{ data: sorted.map(([, v]) => v), backgroundColor: colors.slice(0, sorted.length), borderWidth: 0 }] }, options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { font: { size: 10 }, boxWidth: 12, padding: 8 } } } } });
            }
        }

        // ============ TAB: PLANS ============
        function renderPlans(data) {
            const planCounts = {};
            data.forEach(r => (r.linked_plans || []).forEach(p => { planCounts[p] = (planCounts[p] || 0) + 1; }));
            const sortedPlans = Object.entries(planCounts).sort((a, b) => b[1] - a[1]);

            // Matrix: org × plan
            const allPlans = [...new Set(data.flatMap(r => r.linked_plans || []))];

            let html = `<div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
    <h3 class="text-sm font-bold text-gray-700 mb-4">📋 ความเชื่อมโยงกับแผนระดับประเทศ</h3>
    <div class="space-y-4 mb-6">`;

            sortedPlans.forEach(([plan, count]) => {
                const pct = Math.round((count / 15) * 100);
                html += `<div>
      <div class="flex items-center justify-between mb-1">
        <span class="text-xs font-semibold text-gray-700">${plan}</span>
        <span class="text-xs text-gray-400">${count}/15 หน่วยงาน</span>
      </div>
      <div class="w-full bg-gray-100 rounded-full h-3"><div class="progress-fill bg-gradient-to-r from-green-500 to-emerald-600 h-3 rounded-full" style="width:${pct}%"></div></div>
    </div>`;
            });

            html += `</div></div>
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 mt-6">
    <h3 class="text-sm font-bold text-gray-700 mb-4">📊 Matrix: หน่วยงาน × แผน</h3>
    <div class="overflow-x-auto"><table class="w-full text-xs">
      <thead><tr class="bg-gray-50"><th class="text-left px-2 py-2 font-semibold text-gray-500 sticky left-0 bg-gray-50">หน่วยงาน</th>`;

            allPlans.forEach(p => { html += `<th class="text-center px-2 py-2 font-semibold text-gray-500 whitespace-nowrap">${p.length > 12 ? p.slice(0, 12) + '…' : p}</th>`; });
            html += `</tr></thead><tbody>`;

            data.forEach(r => {
                html += `<tr class="border-t border-gray-50 hover:bg-gray-50">
      <td class="px-2 py-2 text-gray-700 font-medium truncate max-w-[160px] sticky left-0 bg-white">${r.organization}</td>`;
                allPlans.forEach(p => {
                    const has = (r.linked_plans || []).includes(p);
                    html += `<td class="text-center px-2 py-2">${has ? '<span class="text-green-600">✅</span>' : '<span class="text-gray-300">—</span>'}</td>`;
                });
                html += `</tr>`;
            });
            html += `</tbody></table></div></div>`;
            document.getElementById('tab-plans').innerHTML = html;
        }

        // ============ TAB: EXPORT ============
        function renderExport(data) {
            document.getElementById('tab-export').innerHTML = `
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
      <h3 class="text-sm font-bold text-gray-700 mb-2">💾 Export ข้อมูลแบบสอบถาม</h3>
      <p class="text-xs text-gray-400 mb-6">เลือกรูปแบบที่ต้องการ (ข้อมูลทั้งหมด ${data.length} รายการ)</p>
      <div class="grid lg:grid-cols-3 gap-4">
        <button onclick="exportCSV()" class="border-2 border-gray-200 rounded-2xl p-6 text-center hover:border-blue-300 hover:bg-blue-50/50 transition group">
          <div class="text-3xl mb-2">📄</div>
          <p class="text-sm font-bold text-gray-700 group-hover:text-blue-700">Export CSV</p>
          <p class="text-xs text-gray-400 mt-1">เปิดได้ใน Excel · รองรับภาษาไทย</p>
        </button>
        <button onclick="exportJSON()" class="border-2 border-gray-200 rounded-2xl p-6 text-center hover:border-indigo-300 hover:bg-indigo-50/50 transition group">
          <div class="text-3xl mb-2">🗂️</div>
          <p class="text-sm font-bold text-gray-700 group-hover:text-indigo-700">Export JSON</p>
          <p class="text-xs text-gray-400 mt-1">Raw data ทั้งหมด · สำหรับ devs</p>
        </button>
        <button onclick="showSQL()" class="border-2 border-gray-200 rounded-2xl p-6 text-center hover:border-purple-300 hover:bg-purple-50/50 transition group">
          <div class="text-3xl mb-2">🔍</div>
          <p class="text-sm font-bold text-gray-700 group-hover:text-purple-700">SQL Queries</p>
          <p class="text-xs text-gray-400 mt-1">Copy query ไปวิ่งใน Supabase</p>
        </button>
      </div>
    </div>
    <div id="sql-box" style="display:none" class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 mt-6">
      <h3 class="text-sm font-bold text-gray-700 mb-3">🔍 SQL Queries สำเร็จรูป</h3>
      <div class="space-y-4">
        <div class="bg-gray-50 rounded-xl p-4"><p class="text-xs font-semibold text-gray-500 mb-2">ภาพรวมทุกหน่วยงาน</p><pre class="text-xs text-gray-600 whitespace-pre-wrap">SELECT organization, total_staff, ncd_count, ncd_ratio_pct, health_issues, severity_score, hrd_plan_status, submitted_at FROM survey_responses ORDER BY submitted_at DESC;</pre><button onclick="copyText(this.previousElementSibling.textContent)" class="mt-2 text-xs text-blue-600 hover:underline">📋 Copy</button></div>
        <div class="bg-gray-50 rounded-xl p-4"><p class="text-xs font-semibold text-gray-500 mb-2">ปัญหาสุขภาพที่พบบ่อย</p><pre class="text-xs text-gray-600 whitespace-pre-wrap">SELECT unnest(health_issues) AS issue, COUNT(*) AS org_count, ROUND(AVG(severity_score),1) AS avg_severity FROM survey_responses GROUP BY issue ORDER BY org_count DESC;</pre><button onclick="copyText(this.previousElementSibling.textContent)" class="mt-2 text-xs text-blue-600 hover:underline">📋 Copy</button></div>
        <div class="bg-gray-50 rounded-xl p-4"><p class="text-xs font-semibold text-gray-500 mb-2">NCD สูงสุด</p><pre class="text-xs text-gray-600 whitespace-pre-wrap">SELECT organization, total_staff, ncd_count, ncd_ratio_pct FROM survey_responses WHERE ncd_count IS NOT NULL ORDER BY ncd_ratio_pct DESC LIMIT 5;</pre><button onclick="copyText(this.previousElementSibling.textContent)" class="mt-2 text-xs text-blue-600 hover:underline">📋 Copy</button></div>
        <div class="bg-gray-50 rounded-xl p-4"><p class="text-xs font-semibold text-gray-500 mb-2">ค่าเบิกจ่ายรวม</p><pre class="text-xs text-gray-600 whitespace-pre-wrap">SELECT SUM(med_expense_2563) AS total_2563, SUM(med_expense_2564) AS total_2564, SUM(med_expense_2565) AS total_2565, SUM(med_expense_2566) AS total_2566, SUM(med_expense_2567) AS total_2567, COUNT(*) FILTER (WHERE med_expense_available='yes') AS orgs_with_data FROM survey_responses;</pre><button onclick="copyText(this.previousElementSibling.textContent)" class="mt-2 text-xs text-blue-600 hover:underline">📋 Copy</button></div>
      </div>
    </div>`;
        }

        function showSQL() {
            const box = document.getElementById('sql-box');
            box.style.display = box.style.display === 'none' ? 'block' : 'none';
        }

        function copyText(t) { navigator.clipboard.writeText(t).then(() => alert('คัดลอกแล้ว!')); }

        function exportCSV() {
            const headers = ['organization', 'total_staff', 'ncd_count', 'ncd_ratio_pct', 'health_issues', 'severity_score', 'severity_label', 'linked_plans', 'hrd_plan_status', 'submitted_at'];
            const rows = allData.map(r => [r.organization, r.total_staff, r.ncd_count, r.ncd_ratio_pct, (r.health_issues || []).join('; '), r.severity_score, r.severity_label, (r.linked_plans || []).join('; '), r.hrd_plan_status, r.submitted_at ? new Date(r.submitted_at).toLocaleDateString('th-TH') : ''
            ]);
            const csv = [headers, ...rows].map(row => row.map(v => `"${v ?? ''}"`).join(',')).join('\n');
            downloadBlob('\uFEFF' + csv, 'text/csv;charset=utf-8', `HRD_Survey_${new Date().toISOString().slice(0, 10)}.csv`);
        }

        function exportJSON() {
            downloadBlob(JSON.stringify(allData, null, 2), 'application/json', `HRD_Survey_${new Date().toISOString().slice(0, 10)}.json`);
        }

        function downloadBlob(content, type, filename) {
            const blob = new Blob([content], { type });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = filename;
            a.click();
            URL.revokeObjectURL(a.href);
        }

        // ============ TAB SWITCH ============
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => { b.classList.toggle('active', b.dataset.tab === tab); });
            document.querySelectorAll('.tab-content').forEach(el => { el.style.display = 'none'; });
            const target = document.getElementById('tab-' + tab);
            if (target) { target.style.display = 'block'; target.classList.remove('fade-up'); void target.offsetWidth; target.classList.add('fade-up'); }
        }

        // ============ INIT ============
        (async () => {
            const session = await checkAuth();
            if (!session) return;
            document.getElementById('admin-email').textContent = session.user?.email || 'Admin';
            allData = await loadData();
            renderKPI(allData);
            renderOverview(allData);
            renderOrgs(allData);
            renderHealth(allData);
            renderPlans(allData);
            renderExport(allData);
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('app').style.display = 'block';
        })();
    </script>
</body>

</html>
