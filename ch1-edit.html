<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>แก้ไข CH1 — HRD Plan Survey</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:#f5f7fb;color:#1e293b;font-size:15px}
.topbar{background:#1e3a5f;color:#fff;padding:14px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100}
.topbar h1{font-size:17px;font-weight:600}
.topbar .org-badge{background:rgba(255,255,255,.15);border-radius:6px;padding:3px 10px;font-size:13px}
.topbar .status-badge{border-radius:6px;padding:3px 10px;font-size:12px;font-weight:600}
.status-draft{background:#fef3c7;color:#92400e}
.status-submitted{background:#dcfce7;color:#166534}
.status-reopened{background:#fce7f3;color:#9d174d}
.topbar-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.btn{padding:7px 16px;border-radius:7px;border:none;cursor:pointer;font-size:14px;font-weight:500;transition:.15s}
.btn-primary{background:#2563eb;color:#fff}
.btn-primary:hover{background:#1d4ed8}
.btn-secondary{background:#fff;color:#374151;border:1px solid #d1d5db}
.btn-secondary:hover{background:#f9fafb}
.btn-danger{background:#ef4444;color:#fff}
.btn-danger:hover{background:#dc2626}
.btn:disabled{opacity:.5;cursor:not-allowed}
.container{max-width:860px;margin:0 auto;padding:28px 20px 60px}
.alert{border-radius:8px;padding:14px 18px;margin-bottom:20px;font-size:14px}
.alert-warning{background:#fef9c3;border:1px solid #fde047;color:#713f12}
.alert-error{background:#fee2e2;border:1px solid #fca5a5;color:#7f1d1d}
.alert-info{background:#eff6ff;border:1px solid #93c5fd;color:#1e3a8a}
.section-card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;margin-bottom:24px;overflow:hidden}
.section-header{background:#f8fafc;border-bottom:1px solid #e2e8f0;padding:14px 20px;display:flex;align-items:center;gap:10px}
.section-header h2{font-size:15px;font-weight:600;color:#1e3a5f}
.section-body{padding:20px}
.fq-item{margin-bottom:18px}
.fq-label{display:block;font-weight:500;margin-bottom:6px;font-size:14px;color:#374151}
.fq-help{display:block;font-size:12px;color:#6b7280;font-weight:400;margin-top:2px}
.fq-options{display:flex;flex-direction:column;gap:6px}
.fq-opt{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:14px;padding:5px 8px;border-radius:5px;transition:.1s}
.fq-opt:hover{background:#f1f5f9}
.fq-opt input[type=radio],.fq-opt input[type=checkbox]{width:16px;height:16px;cursor:pointer}
input.si,textarea.si,select.si{width:100%;padding:9px 12px;border:1px solid #d1d5db;border-radius:7px;font-size:14px;background:#fff;font-family:inherit;transition:.15s}
input.si:focus,textarea.si:focus,select.si:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
textarea.si{resize:vertical;min-height:80px}
.fq-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.readonly-overlay{pointer-events:none;opacity:.7}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid #e2e8f0;border-top-color:#2563eb;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;color:#64748b}
.action-bar{background:#fff;border-top:1px solid #e2e8f0;position:fixed;bottom:0;left:0;right:0;padding:14px 24px;display:flex;justify-content:flex-end;gap:10px;z-index:90}
.required-star{color:#ef4444}
@media(max-width:640px){.fq-row{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <h1>✏️ แก้ไขข้อมูล CH1</h1>
  <span class="org-badge" id="org-name-badge">กำลังโหลด...</span>
  <span class="status-badge" id="status-badge" style="display:none"></span>
  <div class="topbar-right">
    <button class="btn btn-secondary" onclick="history.back()">← กลับ</button>
    <button class="btn btn-secondary" id="btn-preview" onclick="goPreview()" style="display:none">👁️ Preview</button>
    <button class="btn btn-primary" id="btn-save" onclick="saveForm('draft')" style="display:none" disabled>💾 บันทึก Draft</button>
    <button class="btn btn-primary" id="btn-submit" onclick="saveForm('submitted')" style="display:none" disabled>📤 ส่งข้อมูล</button>
  </div>
</div>

<!-- Main content -->
<div class="container" id="main-container">
  <div class="loading-screen" id="loading-screen">
    <div class="spinner"></div>
    <div>กำลังโหลดข้อมูล...</div>
  </div>
  <div id="content-area" style="display:none"></div>
</div>

<!-- Fixed action bar -->
<div class="action-bar" id="action-bar" style="display:none">
  <button class="btn btn-secondary" onclick="saveForm('draft')" id="ab-save">💾 บันทึก Draft</button>
  <button class="btn btn-primary" onclick="saveForm('submitted')" id="ab-submit">📤 ส่งข้อมูล</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/form-schema.js"></script>
<script>
'use strict';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const params   = new URLSearchParams(location.search);
const ORG_PARAM = params.get('org');
const ID_PARAM  = params.get('id');
const MODE      = params.get('mode') || 'edit'; // edit | view

let userRole = null, userOrgCode = null, responseData = null, schema = null;

// ── Auth Gate ──
async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { location.href = 'org-portal.html'; return; }

  const email = session.user.email;
  const { data: roleRow } = await sb
    .from('admin_user_roles')
    .select('role, org_code, display_name')
    .eq('email', email)
    .maybeSingle();

  if (!roleRow) { showError('ไม่พบสิทธิ์การเข้าใช้งาน'); return; }

  userRole = roleRow.role;
  userOrgCode = roleRow.org_code || null;

  // org_hr can only see their own org
  if (userRole === 'org_hr') {
    if (!userOrgCode || (ORG_PARAM && ORG_PARAM !== userOrgCode)) {
      showError('คุณไม่มีสิทธิ์เข้าถึงข้อมูลองค์กรนี้'); return;
    }
  }

  const targetOrg = ORG_PARAM || userOrgCode;
  if (!targetOrg) { showError('ไม่พบรหัสองค์กร'); return; }

  // Load schema + response in parallel
  try {
    [schema, responseData] = await Promise.all([
      FormSchema.loadFormSchema('ch1'),
      loadResponse(targetOrg)
    ]);
  } catch (e) {
    showError('เกิดข้อผิดพลาดในการโหลดข้อมูล: ' + e.message); return;
  }

  renderPage(targetOrg);
}

async function loadResponse(orgCode) {
  let q = sb.from('hrd_ch1_responses').select('*').order('created_at', { ascending: false });
  if (ID_PARAM) {
    q = q.eq('id', ID_PARAM);
  } else {
    q = q.eq('org_code', orgCode).limit(1);
  }
  const { data } = await q.maybeSingle();
  return data || null;
}

function renderPage(orgCode) {
  const status = responseData?.status || 'draft';
  const orgName = responseData?.organization || orgCode;
  const isReadOnly = (userRole === 'org_hr' && status === 'submitted') || MODE === 'view';

  // Update topbar
  document.getElementById('org-name-badge').textContent = orgName;
  const sb2 = document.getElementById('status-badge');
  sb2.style.display = '';
  sb2.textContent = { draft:'Draft', submitted:'ส่งแล้ว', reopened:'เปิดแก้ไข' }[status] || status;
  sb2.className = 'status-badge status-' + status;

  const contentArea = document.getElementById('content-area');
  contentArea.innerHTML = '';

  if (isReadOnly && status === 'submitted') {
    const alert = document.createElement('div');
    alert.className = 'alert alert-warning';
    alert.innerHTML = `⚠️ ข้อมูลถูกส่งแล้ว (submitted) — อยู่ในโหมดอ่านอย่างเดียว<br>
      <small>หากต้องการแก้ไข กรุณาติดต่อ Admin เพื่อขอเปิดแก้ไข</small>`;
    contentArea.appendChild(alert);
  }

  // Render sections from schema
  if (schema && schema.sections.length > 0) {
    schema.sections.forEach(sec => {
      const card = document.createElement('div');
      card.className = 'section-card';
      card.innerHTML = `<div class="section-header"><h2>📋 ${sec.title_th}</h2>${sec.description ? `<span style="font-size:12px;color:#64748b">${sec.description}</span>` : ''}</div>`;
      const body = document.createElement('div');
      body.className = 'section-body' + (isReadOnly ? ' readonly-overlay' : '');

      (sec.questions || []).forEach(q => {
        const currentVal = responseData ? (responseData[q.question_key] ?? '') : '';
        const wrapper = FormSchema.renderQuestion(q, body, currentVal);
        if (isReadOnly) {
          wrapper.querySelectorAll('input,textarea,select').forEach(el => el.disabled = true);
        }
      });

      card.appendChild(body);
      contentArea.appendChild(card);
    });
  } else {
    // Fallback: render from HRD_CH1_FIELDS keys
    contentArea.innerHTML = '<div class="alert alert-info">ไม่พบข้อมูล Schema — กำลังใช้ fallback</div>';
  }

  // Show buttons
  if (!isReadOnly) {
    document.getElementById('btn-save').style.display = '';
    document.getElementById('btn-submit').style.display = '';
    document.getElementById('btn-save').disabled = false;
    document.getElementById('btn-submit').disabled = false;
    document.getElementById('action-bar').style.display = '';
  }
  document.getElementById('btn-preview').style.display = '';

  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('content-area').style.display = '';
}

function collectFormData() {
  const data = {};
  document.querySelectorAll('[name]').forEach(el => {
    const key = el.name;
    if (!key) return;
    if (el.type === 'radio') {
      if (el.checked) data[key] = el.value;
    } else if (el.type === 'checkbox') {
      if (!Array.isArray(data[key])) data[key] = [];
      if (el.checked) data[key].push(el.value);
    } else if (el.type === 'file') {
      // skip — handled separately
    } else {
      data[key] = el.value;
    }
  });
  return data;
}

async function saveForm(newStatus) {
  const btn = document.getElementById('btn-' + (newStatus === 'draft' ? 'save' : 'submit'));
  const orig = btn.textContent;
  btn.disabled = true;
  btn.textContent = 'กำลังบันทึก...';

  try {
    const formData = collectFormData();
    formData.status = newStatus;
    formData.updated_at = new Date().toISOString();

    let result;
    if (responseData?.id) {
      const { error } = await sb.from('hrd_ch1_responses').update(formData).eq('id', responseData.id);
      if (error) throw error;
    } else {
      formData.org_code = ORG_PARAM || userOrgCode;
      formData.created_at = new Date().toISOString();
      const { data, error } = await sb.from('hrd_ch1_responses').insert(formData).select().single();
      if (error) throw error;
      responseData = data;
    }

    // Update status badge
    const sb2 = document.getElementById('status-badge');
    sb2.textContent = { draft:'Draft', submitted:'ส่งแล้ว', reopened:'เปิดแก้ไข' }[newStatus] || newStatus;
    sb2.className = 'status-badge status-' + newStatus;

    if (newStatus === 'submitted') {
      showAlert('✅ ส่งข้อมูลเรียบร้อยแล้ว — กำลังกลับหน้า portal...', 'info');
      setTimeout(() => { location.href = 'org-portal.html'; }, 1800);
    } else {
      showAlert('✅ บันทึก Draft เรียบร้อยแล้ว', 'info');
    }
  } catch (e) {
    showAlert('❌ เกิดข้อผิดพลาด: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = orig;
  }
}

function goPreview() {
  const orgCode = ORG_PARAM || userOrgCode;
  const id = responseData?.id || ID_PARAM || '';
  location.href = `ch1-preview.html?org=${encodeURIComponent(orgCode)}&id=${id}`;
}

function showAlert(msg, type = 'info') {
  let el = document.getElementById('page-alert');
  if (!el) {
    el = document.createElement('div');
    el.id = 'page-alert';
    document.getElementById('content-area').prepend(el);
  }
  el.className = `alert alert-${type}`;
  el.textContent = msg;
  setTimeout(() => { if (el.parentNode) el.remove(); }, 4000);
}

function showError(msg) {
  document.getElementById('loading-screen').innerHTML = `<div class="alert alert-error" style="max-width:480px">⛔ ${msg}</div><br><a href="org-portal.html" style="color:#2563eb">← กลับหน้า Portal</a>`;
}

init();
</script>
</body>
</html>
